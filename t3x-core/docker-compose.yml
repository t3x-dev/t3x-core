# T3X Core API - Docker Compose 配置
#
# 启动：
#   docker-compose up
#
# 后台启动：
#   docker-compose up -d
#
# 停止：
#   docker-compose down

version: '3.8'

services:
  core-api:
    build: .
    container_name: t3x-core-api
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据
      - ./.t3x:/app/.t3x
    environment:
      - CF_HOST=0.0.0.0
      - CF_PORT=8000
      - CF_LOG_LEVEL=info
      # 可选：启用认证
      # - CF_AUTH_ENABLED=true
      # - CF_AUTH_TOKEN=your-secret-token
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # 可选：开发模式（自动重载）
  core-api-dev:
    build: .
    container_name: t3x-core-api-dev
    ports:
      - "8001:8000"
    volumes:
      - ./core:/app/core
      - ./core_api:/app/core_api
      - ./.t3x:/app/.t3x
    environment:
      - CF_HOST=0.0.0.0
      - CF_PORT=8000
      - CF_RELOAD=true
    profiles:
      - dev
    command: ["python", "-m", "core_api", "--reload"]
