name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # CLI TypeScript Tests
  test-cli:
    name: CLI Tests (TypeScript)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: ./cli
        run: npm ci

      - name: Build CLI
        working-directory: ./cli
        run: npm run build

      - name: Run CLI tests
        working-directory: ./cli
        run: npm test

  # Python SDK Tests
  test-python-sdk:
    name: Python SDK Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            sdk/python/setup.py

      - name: Install Python SDK dependencies
        working-directory: ./sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Python tests
        working-directory: ./sdk/python
        run: pytest -v

  # JavaScript SDK Tests
  test-js-sdk:
    name: JavaScript SDK Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: sdk/javascript/package-lock.json

      - name: Install JS SDK dependencies
        working-directory: ./sdk/javascript
        run: npm ci

      - name: Build JS SDK
        working-directory: ./sdk/javascript
        run: npm run build

      - name: Run JS SDK tests
        working-directory: ./sdk/javascript
        run: npm test

  # Quality Gates
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [test-cli, test-python-sdk, test-js-sdk]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install CLI dependencies
        working-directory: ./cli
        run: npm ci

      - name: Build CLI
        working-directory: ./cli
        run: npm run build

      - name: Run determinism tests
        working-directory: ./cli
        run: npm test -- regression.test.ts --testNamePattern="determinism"

      - name: Run evidence quality tests
        working-directory: ./cli
        run: npm test -- regression.test.ts --testNamePattern="evidence"

      - name: Check all tests passed
        run: echo "✅ All quality gates passed!"
