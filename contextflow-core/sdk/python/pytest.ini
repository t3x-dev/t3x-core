[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
markers =
    integration: Integration tests (may be slow)
    unit: Unit tests (fast)

[coverage:run]
source = contextflow
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
# Coverage thresholds (MVP target: >90%)
fail_under = 90

[coverage:html]
directory = htmlcov
