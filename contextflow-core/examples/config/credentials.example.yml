# ContextFlow Credentials Example
# WARNING: Keep this file secure and never commit to version control!
# Add to .gitignore: credentials.yml

# This file is for storing API credentials separately from main config
# Recommended: Use environment variables instead when possible

# OpenAI
openai:
  apiKey: sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  organizationId: org-xxxxxxxxxxxxxxxxxxxxxxxx  # Optional

# Anthropic (Claude)
anthropic:
  apiKey: sk-ant-api03-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Google AI
google:
  apiKey: AIzaSyxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Azure OpenAI (if using Azure)
azure:
  apiKey: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  endpoint: https://your-resource.openai.azure.com/
  deploymentName: gpt-4

# Custom providers
custom:
  provider1:
    apiKey: your-api-key-here
    endpoint: https://api.example.com
    customField: value

# Cloud storage credentials (if not using environment variables)
storage:
  aws:
    accessKeyId: AKIAIOSFODNN7EXAMPLE
    secretAccessKey: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    region: us-east-1

  gcp:
    projectId: my-project-12345
    serviceAccountKey: |
      {
        "type": "service_account",
        "project_id": "my-project-12345",
        ...
      }

  azure:
    storageAccountName: mycontextflowstorage
    storageAccountKey: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Environment-based credentials (recommended approach)
# Instead of storing here, use:
#
# export OPENAI_API_KEY=sk-...
# export ANTHROPIC_API_KEY=sk-ant-...
# export GOOGLE_AI_API_KEY=AIza...
# export AWS_ACCESS_KEY_ID=AKIA...
# export AWS_SECRET_ACCESS_KEY=wJal...
