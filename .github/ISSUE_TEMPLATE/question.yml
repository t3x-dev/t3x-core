name: "Question"
description: "Ask a question about T3X"
title: "[Question]: "
labels:
  - "question"
body:
  - type: textarea
    id: question
    attributes:
      label: "Your question"
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: "Related scope"
      options:
        - core
        - cli
        - webui
        - schema
        - agents
        - other
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: "Confirmation"
      options:
        - label: "I searched docs/README"
    validations:
      required: false
