name: "Engineering Task"
description: "Refactor, tests, CI, perf, dependency upgrades, chores"
title: "[Task]: "
labels:
  - "enhancement"
body:
  - type: dropdown
    id: scope
    attributes:
      label: "Module"
      options:
        - core
        - cli
        - webui
        - schema
        - agents
        - infra
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: "Improvements"
      placeholder: "Why do we need this now?"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance criteria"
      placeholder: "- [ ] tests pass\n- [ ] doc updated ..."
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: "Confirmation"
      options:
        - label: "This task is well-scoped and actionable"
    validations:
      required: false
