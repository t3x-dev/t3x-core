name: t3x-runner

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feat/runner

jobs:
  protocol-checks:
    name: protocol checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Suite schema check
        run: npm run schema:check --prefix t3x-runner

