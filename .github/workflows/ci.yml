name: CI

on:
  push:
    branches: [main, develop, 'feature/*']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          # Clean npm cache to avoid EEXIST race condition errors
          npm cache clean --force
          # Delete lock file to avoid cross-platform optional dependency issues
          rm -f package-lock.json
          npm install

      - name: Build packages
        run: npm run build:core && npm run build:storage

      - name: Run t3x-core tests
        run: npm run test:core

      - name: Run t3x-storage tests
        run: npm run test:storage

      - name: Build webui
        run: npm run build:webui

      - name: Run t3x-webui tests
        run: npm run test:webui
        continue-on-error: true  # Don't block CI initially until tests are proven stable

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          # Clean npm cache to avoid EEXIST race condition errors
          npm cache clean --force
          # Delete lock file to avoid cross-platform optional dependency issues
          rm -f package-lock.json
          npm install

      - name: Build all packages
        run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          # Clean npm cache to avoid EEXIST race condition errors
          npm cache clean --force
          # Delete lock file to avoid cross-platform optional dependency issues
          rm -f package-lock.json
          npm install

      - name: Build core (required for lint)
        run: npm run build:core

      - name: Run linter
        run: npm run lint
        continue-on-error: true  # Don't fail CI on lint warnings initially
