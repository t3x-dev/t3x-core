name: CI

on:
  push:
    branches: [main, develop, 'feature/*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

# Required for dorny/paths-filter to access PR info
permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which packages changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      storage: ${{ steps.filter.outputs.storage }}
      webui: ${{ steps.filter.outputs.webui }}
      api: ${{ steps.filter.outputs.api }}
      runner: ${{ steps.filter.outputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for accurate diff
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            storage:
              - 'packages/storage/**'
              - 'packages/core/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            webui:
              - 'apps/web/**'
              - 'packages/storage/**'
              - 'packages/core/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            api:
              - 'apps/api/**'
              - 'packages/storage/**'
              - 'packages/core/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            runner:
              - 'apps/runner/**'
              - 'apps/api/src/routes/runs.ts'
              - 'apps/api/src/routes/deploy-agents.ts'
              - 'apps/web/src/lib/api.ts'
              - 'apps/web/src/app/deploy/**'
              - 'apps/web/src/app/eval/**'
              - 'packages/storage/src/queries/runs.ts'
              - 'packages/storage/src/queries/deployAgents.ts'
              - 'packages/storage/src/schema/runs.ts'
              - 'packages/storage/src/schema/deployAgents.ts'
              - 'docker-compose.yml'
              - 'apps/api/Dockerfile'
              - 'apps/runner/Dockerfile'
              - 'apps/web/Dockerfile'

  # ===========================================
  # FAST CHECKS - Run on every push (feature branches)
  # ===========================================
  quick-check:
    name: Quick Check (Lint & Typecheck)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core (required for typecheck)
        run: pnpm build:core

      - name: Lint
        run: pnpm lint

  # ===========================================
  # FULL TESTS - Run on PRs and main
  # ===========================================
  test-core-storage:
    name: Test Core & Storage
    runs-on: ubuntu-latest
    needs: changes
    # Run on PR, or push to main, if relevant files changed
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      (needs.changes.outputs.core == 'true' || needs.changes.outputs.storage == 'true')

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5446:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:core && pnpm build:storage

      - name: Run @t3x-dev/core tests
        run: pnpm --filter @t3x-dev/core test

      - name: Run @t3x-dev/storage tests
        run: pnpm --filter @t3x-dev/storage test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5446/postgres

  test-webui:
    name: Test WebUI
    runs-on: ubuntu-latest
    needs: changes
    # Run on PR, or push to main, if webui or its dependencies changed
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      (needs.changes.outputs.webui == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.storage == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm build:core && pnpm build:storage

      - name: Build webui
        run: pnpm build:webui

      - name: Run t3x-webui tests
        run: pnpm --filter t3x-webui test

  # ===========================================
  # BUILD - Run on PRs and main
  # ===========================================
  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [changes, test-core-storage, test-webui]
    if: |
      always() &&
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      (needs.test-core-storage.result == 'success' || needs.test-core-storage.result == 'skipped') &&
      (needs.test-webui.result == 'success' || needs.test-webui.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  # ===========================================
  # LINT - Run on PRs (already covered in quick-check for pushes)
  # ===========================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.core == 'true' || needs.changes.outputs.storage == 'true' || needs.changes.outputs.webui == 'true' || needs.changes.outputs.api == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core (required for lint)
        run: pnpm build:core

      - name: Run linter
        run: pnpm lint

  # ===========================================
  # RUNNER UNIT TESTS - Runner's own test suite
  # Only runs when runner-related files change
  # ===========================================
  test-runner-unit:
    name: Runner Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      needs.changes.outputs.runner == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm build:core

      - name: Run @t3x-dev/runner tests
        run: pnpm --filter @t3x-dev/runner test

  # ===========================================
  # RUNNER CONTRACT TESTS - Protect Runner/n8n integration
  # Only runs when runner-related files change
  # ===========================================
  test-runner-contracts:
    name: Runner Contract Tests
    runs-on: ubuntu-latest
    needs: changes
    # Run on PR or push to main, only if runner-related files changed
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      needs.changes.outputs.runner == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm build:core && pnpm build:storage

      - name: Run API contract tests (runs, deploy-agents)
        run: pnpm --filter @t3x-dev/api test -- src/__tests__/contracts/

      - name: Run WebUI API endpoint tests
        run: pnpm --filter t3x-webui test -- src/__tests__/contracts/

  # ===========================================
  # WEBUI E2E TESTS - Playwright (full browser)
  # ===========================================
  test-webui-e2e:
    name: WebUI E2E (Playwright)
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      (needs.changes.outputs.webui == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.storage == 'true' || needs.changes.outputs.api == 'true')

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5446:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm build:core && pnpm build:storage && pnpm build:api

      - name: Install Playwright browsers
        run: pnpm --filter t3x-webui exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter t3x-webui test:e2e
        env:
          CI: 'true'
          DATABASE_URL: postgresql://postgres:password@localhost:5446/postgres

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 14
