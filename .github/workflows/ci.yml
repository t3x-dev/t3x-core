name: CI

on:
  push:
    branches: [main, develop, 'feature/*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

jobs:
  # Detect which packages changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      storage: ${{ steps.filter.outputs.storage }}
      webui: ${{ steps.filter.outputs.webui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 't3x-core/**'
              - 'package.json'
            storage:
              - 't3x-storage/**'
              - 'package.json'
            webui:
              - 't3x-webui/**'
              - 'package.json'

  # ===========================================
  # FAST CHECKS - Run on every push (feature branches)
  # ===========================================
  quick-check:
    name: Quick Check (Lint & Typecheck)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build core (required for typecheck)
        run: npm run build:core

      - name: Typecheck
        run: npx tsc --noEmit -p t3x-core/tsconfig.json
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

  # ===========================================
  # FULL TESTS - Run on PRs and main
  # ===========================================
  test-core-storage:
    name: Test Core & Storage
    runs-on: ubuntu-latest
    needs: changes
    # Run on PR, or push to main, if relevant files changed
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      (needs.changes.outputs.core == 'true' || needs.changes.outputs.storage == 'true')

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build packages
        run: npm run build:core && npm run build:storage

      - name: Run t3x-core tests
        run: npm run test:core

      - name: Run t3x-storage tests
        run: npm run test:storage

  test-webui:
    name: Test WebUI
    runs-on: ubuntu-latest
    needs: changes
    # Run on PR, or push to main, if webui or its dependencies changed
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      (needs.changes.outputs.webui == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.storage == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build dependencies
        run: npm run build:core && npm run build:storage

      - name: Build webui
        run: npm run build:webui

      - name: Run t3x-webui tests
        run: npm run test:webui
        continue-on-error: true  # Don't block CI until tests are proven stable

  # ===========================================
  # BUILD - Run on PRs and main
  # ===========================================
  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [changes, test-core-storage, test-webui]
    if: |
      always() &&
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      (needs.test-core-storage.result == 'success' || needs.test-core-storage.result == 'skipped') &&
      (needs.test-webui.result == 'success' || needs.test-webui.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build all packages
        run: npm run build

  # ===========================================
  # LINT - Run on PRs (already covered in quick-check for pushes)
  # ===========================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.core == 'true' || needs.changes.outputs.storage == 'true' || needs.changes.outputs.webui == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build core (required for lint)
        run: npm run build:core

      - name: Run linter
        run: npm run lint
        continue-on-error: true
