name: CI

on:
  push:
    branches: [main, develop, 'feature/*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

# Required for dorny/paths-filter to access PR info
permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which packages changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      storage: ${{ steps.filter.outputs.storage }}
      webui: ${{ steps.filter.outputs.webui }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for accurate diff
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            storage:
              - 'packages/storage/**'
              - 'packages/core/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            webui:
              - 'apps/web/**'
              - 'packages/storage/**'
              - 'packages/core/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            api:
              - 'apps/api/**'
              - 'packages/storage/**'
              - 'packages/core/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  # ===========================================
  # FAST CHECKS - Run on every push (feature branches)
  # ===========================================
  quick-check:
    name: Quick Check (Lint & Typecheck)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core (required for typecheck)
        run: pnpm build:core

      - name: Lint
        run: pnpm lint

  # ===========================================
  # FULL TESTS - Run on PRs and main
  # ===========================================
  test-core-storage:
    name: Test Core & Storage
    runs-on: ubuntu-latest
    needs: changes
    # Run on PR, or push to main, if relevant files changed
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      (needs.changes.outputs.core == 'true' || needs.changes.outputs.storage == 'true')

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:core && pnpm build:storage

      - name: Run @t3x/core tests
        run: pnpm --filter @t3x/core test

      - name: Run @t3x/storage tests
        run: pnpm --filter @t3x/storage test

  test-webui:
    name: Test WebUI
    runs-on: ubuntu-latest
    needs: changes
    # Run on PR, or push to main, if webui or its dependencies changed
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      (needs.changes.outputs.webui == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.storage == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm build:core && pnpm build:storage

      - name: Build webui
        run: pnpm build:webui

      - name: Run t3x-webui tests
        run: pnpm --filter t3x-webui test

  # ===========================================
  # BUILD - Run on PRs and main
  # ===========================================
  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [changes, test-core-storage, test-webui]
    if: |
      always() &&
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      (needs.test-core-storage.result == 'success' || needs.test-core-storage.result == 'skipped') &&
      (needs.test-webui.result == 'success' || needs.test-webui.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  # ===========================================
  # LINT - Run on PRs (already covered in quick-check for pushes)
  # ===========================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.core == 'true' || needs.changes.outputs.storage == 'true' || needs.changes.outputs.webui == 'true' || needs.changes.outputs.api == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core (required for lint)
        run: pnpm build:core

      - name: Run linter
        run: pnpm lint
