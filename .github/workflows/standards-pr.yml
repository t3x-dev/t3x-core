name: Standards

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  standards:
    name: Standards matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > .standards-changed-files.txt
          else
            git diff --name-only HEAD^ HEAD > .standards-changed-files.txt || true
          fi

      - name: Run affected standards rows
        run: pnpm standards:run -- --mode pr --changed-paths .standards-changed-files.txt --summary-file .standards-summary.md
        env:
          YOPS_STABILITY_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          T3X_PR_BODY: ${{ github.event.pull_request.body }}

      - name: Publish standards summary
        if: always()
        run: |
          if [ -f .standards-summary.md ]; then
            cat .standards-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Standards runner failed before writing a summary." >> "$GITHUB_STEP_SUMMARY"
          fi
