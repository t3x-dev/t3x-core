name: PR Validation

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Check, build, and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-dev-
            turbo-${{ runner.os }}-main-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release PR policy
        if: github.event_name == 'pull_request'
        env:
          T3X_PR_BASE: ${{ github.base_ref }}
          T3X_PR_HEAD: ${{ github.head_ref }}
          T3X_PR_BODY: ${{ github.event.pull_request.body }}
          T3X_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          T3X_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node tools/check-release-pr.mjs

      - name: Lint and format check
        run: pnpm check

      - name: Check release surface
        run: pnpm check:release-surface

      - name: Build packages
        run: pnpm build

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/postgres
        run: pnpm test
