name: local-smoke

on:
  pull_request:
    paths:
      - '.changeset/**'
      - '.github/workflows/local-smoke.yml'
      - '.github/workflows/release.yml'
      - 'apps/cli/**'
      - 'apps/local/**'
      - 'apps/mcp/**'
      - 'apps/runner/**'
      - 'packages/api-client/**'
      - 'packages/api/**'
      - 'packages/core/**'
      - 'packages/mcp/**'
      - 'packages/storage/**'
      - 'packages/yops/**'
      - 'packages/yschema/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tools/**'
  workflow_dispatch: {}

jobs:
  smoke:
    name: Clean install smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify fixed versions
        run: pnpm verify:versions:no-manifest

      - name: Build packages
        run: pnpm build

      - name: Build runtime artifact
        run: pnpm build:local-runtime

      - name: Verify fixed versions with manifest
        run: pnpm verify:versions

      - name: Smoke local install
        run: pnpm smoke:local-install
