name: local-smoke

on:
  pull_request:
    paths:
      - '.changeset/**'
      - '.github/workflows/local-smoke.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/sync-main-into-dev.yml'
      - 'apps/cli/**'
      - 'apps/api/**'
      - 'apps/agent-demo/**'
      - 'apps/local/**'
      - 'apps/mcp/**'
      - 'apps/runner/**'
      - 'apps/web/**'
      - 'packages/api-client/**'
      - 'packages/api/**'
      - 'packages/core/**'
      - 'packages/mcp/**'
      - 'packages/storage/**'
      - 'packages/yops/**'
      - 'packages/yschema/**'
      - 'biome.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'tools/**'
  workflow_dispatch: {}

jobs:
  smoke:
    name: Clean install smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be installed before setup-node so the latter can pick
      # up `cache: 'pnpm'` and resolve the pnpm store path.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Caches the pnpm store between runs. First run still cold;
          # subsequent runs that share the same pnpm-lock.yaml hit the
          # cache and reduce `pnpm install` from ~60-90s to ~5-10s.
          cache: 'pnpm'

      # Caches Turborepo's local task outputs (`.turbo/`). Packages
      # whose inputs haven't changed since the last run hit the cache
      # and skip the actual build (`>>> FULL TURBO` in the log).
      # `restore-keys` lets a PR fall back to the latest main cache
      # when the PR-specific cache doesn't exist yet.
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-main-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify fixed versions
        run: pnpm verify:versions:no-manifest

      # Lint and format gate. Placed before build so style/import-rule
      # failures surface fast without paying for a full workspace build.
      # Note: this step alone makes Biome part of CI, but for `local-
      # smoke / Clean install smoke` to actually BLOCK merge, the repo
      # branch protection rule on `main` must mark this workflow as a
      # required status check (one-time GitHub repo setting, not in
      # this file).
      - name: Lint and format check
        run: pnpm check

      - name: Build packages
        run: pnpm build

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/postgres
        run: pnpm test

      - name: Build runtime artifact
        run: pnpm build:local-runtime

      - name: Verify fixed versions with manifest
        run: pnpm verify:versions

      - name: Smoke local install
        run: pnpm smoke:local-install
