name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset-state:
    name: Changeset State
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.detect.outputs.has_changesets }}
      is_version_packages: ${{ steps.detect.outputs.is_version_packages }}
      should_release: ${{ steps.detect.outputs.should_release }}
      should_publish: ${{ steps.detect.outputs.should_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect release state
        id: detect
        shell: bash
        run: |
          changeset_count="$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')"
          if [[ "$changeset_count" -gt 0 ]]; then
            has_changesets=true
          else
            has_changesets=false
          fi

          head_message="$(git log -1 --pretty=%B)"
          if grep -Fq "chore: version packages" <<<"$head_message"; then
            is_version_packages=true
          else
            is_version_packages=false
          fi

          should_release=false
          if [[ "$has_changesets" == "true" || "$is_version_packages" == "true" ]]; then
            should_release=true
          fi

          echo "has_changesets=$has_changesets" >> "$GITHUB_OUTPUT"
          echo "is_version_packages=$is_version_packages" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "should_publish=$is_version_packages" >> "$GITHUB_OUTPUT"

          echo "has_changesets=$has_changesets"
          echo "is_version_packages=$is_version_packages"
          echo "should_release=$should_release"
          echo "should_publish=$is_version_packages"

  build-runtime:
    name: Build Runtime (${{ matrix.platform }})
    needs: changeset-state
    if: needs.changeset-state.outputs.should_publish == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify fixed versions
        run: pnpm verify:versions:no-manifest

      - name: Build workspace
        run: pnpm build

      - name: Prepare runtime tarball
        env:
          T3X_LOCAL_RUNTIME_PLATFORM: ${{ matrix.platform }}
        run: pnpm --filter @t3x-dev/local prepare:runtime

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.platform }}
          path: apps/local/runtime-artifacts/*.tar.gz
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - changeset-state
      - build-runtime
    if: |
      always() &&
      needs.changeset-state.outputs.should_release == 'true' &&
      (
        needs.changeset-state.outputs.should_publish != 'true' ||
        needs.build-runtime.result == 'success'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download runtime artifacts
        if: needs.changeset-state.outputs.should_publish == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          path: apps/local/runtime-artifacts
          merge-multiple: true

      - name: Generate full runtime manifest
        if: needs.changeset-state.outputs.should_publish == 'true'
        run: pnpm --filter @t3x-dev/local generate:runtime-manifest

      - name: Verify fixed versions
        if: needs.changeset-state.outputs.should_publish == 'true'
        run: pnpm verify:versions

      - name: Verify fixed versions without runtime manifest
        if: needs.changeset-state.outputs.should_publish != 'true'
        run: pnpm verify:versions:no-manifest

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm publish-release
          createGithubReleases: false
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
