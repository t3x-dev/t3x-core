name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  build-runtime:
    name: Build Runtime (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
          - platform: darwin-x64
            runner: macos-13
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
          - platform: linux-x64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify fixed versions
        run: pnpm verify:versions:no-manifest

      - name: Build local package
        run: pnpm build:local

      - name: Build API server
        run: pnpm build:api-server

      - name: Build Web UI
        run: pnpm build:webui

      - name: Prepare runtime tarball
        env:
          T3X_LOCAL_RUNTIME_PLATFORM: ${{ matrix.platform }}
        run: pnpm --filter @t3x-dev/local prepare:runtime

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.platform }}
          path: apps/local/runtime-artifacts/*.tar.gz
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-runtime
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      local_version: ${{ steps.local_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          path: apps/local/runtime-artifacts
          merge-multiple: true

      - name: Generate full runtime manifest
        run: pnpm --filter @t3x-dev/local generate:runtime-manifest

      - name: Verify fixed versions
        run: pnpm verify:versions

      - name: Read local package version
        id: local_version
        run: echo "version=$(node -p "require('./apps/local/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload runtime manifest
        uses: actions/upload-artifact@v4
        with:
          name: runtime-manifest
          path: apps/local/runtime-manifest.json
          if-no-files-found: error

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm publish-packages
          createGithubReleases: true
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-runtime-release:
    name: Publish Runtime Release
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true'

    steps:
      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          path: release-assets
          merge-multiple: true

      - name: Download runtime manifest
        uses: actions/download-artifact@v4
        with:
          name: runtime-manifest
          path: release-assets

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: t3x-local-v${{ needs.release.outputs.local_version }}
          name: t3x-local v${{ needs.release.outputs.local_version }}
          files: |
            release-assets/*.tar.gz
            release-assets/runtime-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
