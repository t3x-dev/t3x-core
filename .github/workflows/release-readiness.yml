name: release-readiness

on:
  pull_request:
    paths:
      - '.github/workflows/release-readiness.yml'
      - 'apps/web/**'
      - 'packages/core/src/fixtures/demo-workspace.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tools/release-readiness.mjs'
      - 'tools/__tests__/releaseReadiness.test.mjs'
  workflow_dispatch: {}

jobs:
  release-readiness:
    name: Release readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release readiness checks
        run: pnpm release:check
