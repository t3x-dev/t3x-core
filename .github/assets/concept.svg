<svg width="760" height="220" viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="760" height="220" rx="20" fill="#020617"/>
  <rect x="18" y="18" width="724" height="184" rx="16" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Source evidence -->
  <rect x="285" y="32" width="190" height="46" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="380" y="53" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Source evidence</text>
  <text x="380" y="68" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle">conversation, doc, spec</text>

  <line x1="380" y1="84" x2="380" y2="101" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Old YAML state -->
  <rect x="54" y="104" width="172" height="56" rx="13" fill="#064e3b" stroke="#10b981" stroke-width="1.7"/>
  <text x="140" y="128" fill="#6ee7b7" font-size="15" font-weight="800" text-anchor="middle">Old YAML</text>
  <text x="140" y="146" fill="#a7f3d0" font-size="10.5" font-weight="500" text-anchor="middle">current state</text>

  <text x="258" y="139" fill="#64748b" font-size="28" font-weight="500" text-anchor="middle">+</text>

  <!-- YOps patch -->
  <rect x="300" y="104" width="160" height="56" rx="13" fill="#1e293b" stroke="#f97316" stroke-width="1.7"/>
  <text x="380" y="128" fill="#fb923c" font-size="15" font-weight="800" text-anchor="middle">YOps patch</text>
  <text x="380" y="146" fill="#fdba74" font-size="10.5" font-weight="500" text-anchor="middle">deterministic ops</text>

  <line x1="474" y1="132" x2="526" y2="132" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- New YAML state -->
  <rect x="540" y="104" width="166" height="56" rx="13" fill="#064e3b" stroke="#10b981" stroke-width="1.7"/>
  <text x="623" y="128" fill="#6ee7b7" font-size="15" font-weight="800" text-anchor="middle">New YAML</text>
  <text x="623" y="146" fill="#a7f3d0" font-size="10.5" font-weight="500" text-anchor="middle">next state</text>

  <line x1="380" y1="166" x2="380" y2="181" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Version control surface -->
  <rect x="255" y="178" width="250" height="32" rx="10" fill="#111827" stroke="#334155" stroke-width="1.3"/>
  <text x="380" y="199" fill="#cbd5e1" font-size="12.5" font-weight="700" text-anchor="middle">commit / diff / merge</text>
</svg>
