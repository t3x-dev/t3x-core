version: 1
notes: |
  Source of truth for the T3X alpha release package surface.
  Changes to public package entries require owner approval and a stability note.
packages:
  - name: "@t3x-dev/local"
    path: apps/local
    access: restricted
    publish_state: applied
    npm_publish: true
    stability_tier: alpha
    readme_required: true
    api_extractor: false
    why: First-door local installer and no-key demo entrypoint.

  - name: "@t3x-dev/yops"
    path: packages/yops
    access: restricted
    publish_state: applied
    npm_publish: true
    stability_tier: alpha
    readme_required: true
    api_extractor: true
    why: Public deterministic YAML operation contract.

  - name: "@t3x-dev/core"
    path: packages/core
    access: restricted
    publish_state: applied
    npm_publish: false
    stability_tier: internal
    readme_required: false
    api_extractor: false
    why: Candidate engine package; not part of the alpha public surface.

