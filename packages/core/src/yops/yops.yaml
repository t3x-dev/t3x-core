# ============================================================================
# YOps — YAML Operations for Knowledge Trees
# ============================================================================
#
# This file IS the YOps specification. It is declarative, machine-readable,
# and self-describing. Any YAML parser can read it. Any language can
# implement an engine from it.
#
# T3X provides the reference implementation in TypeScript.
# ============================================================================

name: yops
description: YAML-native operations for knowledge trees

# ----------------------------------------------------------------------------
# Tree — what YOps operates on
# ----------------------------------------------------------------------------
tree:
  node:
    key:
      type: string
      pattern: "^[a-z][a-z0-9_]*$"
      description: snake_case identifier
    slots:
      type: map
      value_type: any                 # string | number | boolean | list | map
      description: key-value facts
    children:
      type: list
      item_type: node                 # recursive
      description: nested subtopic nodes
    metadata:
      source:
        type: map
        description: maps slot keys to verbatim conversation quotes
        required: true                # every slot must have a source
      from:
        type: string
        description: source turn identifier (e.g., T3)
        required: true
      confidence:
        type: number
        min: 0
        max: 1
        default: 1.0
        description: extraction certainty

  path:
    separator: "/"
    description: nodes referenced by slash-separated paths from root
    example: hangzhou_trip/dining/budget

  relations:
    types: [causes, conditions, contrasts, follows, depends]

# ----------------------------------------------------------------------------
# Operations
# ----------------------------------------------------------------------------
operations:

  # === Content ===

  set:
    description: assign a value to a slot on an existing node
    fields:
      path:
        type: string
        required: true
        description: node_path/slot_name
      value:
        type: any
        required: true
        description: the value to set
      source:
        type: string
        required: true
        description: verbatim quote from conversation
      from:
        type: string
        required: true
        description: source turn identifier
      confidence:
        type: number
        min: 0
        max: 1
        required: false
    rules:
      - parent node must exist
      - creates slot if absent, overwrites if present
      - source and from are always required
    errors:
      NODE_NOT_FOUND: parent node does not exist
      MISSING_SOURCE: source or from not provided
    example:
      - set:
          path: trip/dining/budget
          value: 2000
          source: "let's do 2000"
          from: T5

  unset:
    description: remove a slot from an existing node
    fields:
      path:
        type: string
        required: true
        description: node_path/slot_name
    rules:
      - parent node must exist
      - no-op if slot already absent
      - corresponding source quote is also removed
    errors:
      NODE_NOT_FOUND: parent node does not exist
    example:
      - unset:
          path: trip/dining/style

  # === Structure ===

  add:
    description: create a new node with slots under a parent
    fields:
      parent:
        type: string
        required: true
        description: parent path, empty string for root level
      node:
        type: map
        required: true
        description: exactly one top-level key containing slots
      source:
        type: map
        required: true
        description: maps each slot key to verbatim quote
      from:
        type: string
        required: true
        description: source turn identifier
      confidence:
        type: number
        min: 0
        max: 1
        required: false
        default: 1.0
    rules:
      - node must have exactly one top-level key
      - key must be snake_case
      - parent must exist (or be empty for root)
      - no sibling key conflict
      - every slot must have corresponding source entry
      - node can contain nested children
    errors:
      PARENT_NOT_FOUND: parent path does not exist
      DUPLICATE_KEY: sibling with same key exists
      INVALID_KEY: key does not match snake_case
      MISSING_SOURCE: slot has no source quote
    example:
      - add:
          parent: trip
          node:
            dining:
              budget: 1000
              style: casual
          source:
            budget: "about 1000 yuan"
            style: "keep it casual"
          from: T3
          confidence: 0.85

  drop:
    description: remove a node, its children, and referencing relations
    fields:
      path:
        type: string
        required: true
      reason:
        type: string
        required: false
        description: audit trail
    rules:
      - children removed recursively
      - relations referencing path or child paths removed
    errors:
      NODE_NOT_FOUND: path does not exist
    example:
      - drop:
          path: trip/shopping
          reason: "user cancelled"

  rename:
    description: change a node key without moving it
    fields:
      path:
        type: string
        required: true
      to:
        type: string
        required: true
        description: new key (snake_case)
    rules:
      - new key must be snake_case
      - no sibling conflict
      - relations updated to new path
      - child paths updated accordingly
    errors:
      NODE_NOT_FOUND: path does not exist
      DUPLICATE_KEY: sibling with new key exists
      INVALID_KEY: key does not match snake_case
    example:
      - rename:
          path: trip/food_cost
          to: dining_budget

  clone:
    description: deep copy a subtree to a new parent
    fields:
      path:
        type: string
        required: true
        description: source node to copy
      to:
        type: string
        required: true
        description: parent path for the copy
    rules:
      - source must exist
      - target parent must exist (or empty for root)
      - deep copy, independent of original
      - relations are not cloned
      - source quotes and metadata preserved
    errors:
      NODE_NOT_FOUND: source path does not exist
      PARENT_NOT_FOUND: target parent does not exist
      DUPLICATE_KEY: sibling with same key at target
    example:
      - clone:
          path: trip/dining
          to: reference

  # === Reshape ===

  move:
    description: relocate a subtree to a new position
    fields:
      path:
        type: string
        required: true
        description: current path
      to:
        type: string
        required: true
        description: full target path (new_parent/node_key)
    rules:
      - source must exist
      - target parent must exist
      - children, slots, metadata move with node
      - relations updated to new path
      - cannot move into own subtree
    errors:
      NODE_NOT_FOUND: source does not exist
      PARENT_NOT_FOUND: target parent does not exist
      CYCLE_DETECTED: target within source subtree
      DUPLICATE_KEY: sibling conflict at target
    example:
      - move:
          path: trip/dining
          to: trip/food_and_drink/dining

  nest:
    description: group sibling nodes under a new parent
    fields:
      paths:
        type: list
        item_type: string
        required: true
        description: sibling node paths to group
      under:
        type: string
        required: true
        description: new parent key (snake_case)
    rules:
      - all nodes must be siblings
      - under must be snake_case
      - new node created at same level, listed nodes become its children
      - new node has no slots (pure container)
      - relations updated to new paths
    errors:
      NODE_NOT_FOUND: one or more paths missing
      NOT_SIBLINGS: nodes do not share parent
      DUPLICATE_KEY: under key conflicts with sibling
      INVALID_KEY: under not snake_case
    example:
      - nest:
          paths: [trip/budget, trip/schedule, trip/booking]
          under: logistics

  split:
    description: distribute a node slots into new child nodes
    fields:
      path:
        type: string
        required: true
      into:
        type: map
        required: true
        description: new_child_key -> list of slot names to move
    rules:
      - node must exist
      - all slot names must exist on node
      - child keys must be snake_case
      - source quotes follow their slots
      - unlisted slots stay on original node
      - a slot cannot appear in multiple children
    errors:
      NODE_NOT_FOUND: path does not exist
      SLOT_NOT_FOUND: referenced slot missing
      INVALID_KEY: child key not snake_case
      DUPLICATE_SLOT: slot in multiple children
    example:
      - split:
          path: trip/everything
          into:
            dining: [budget, cuisine]
            transport: [mode, duration]

  fold:
    description: collapse single-child chain by promoting child
    fields:
      path:
        type: string
        required: true
        description: node with exactly one child and no slots
    rules:
      - must have exactly one child
      - must have no slots
      - child replaces node at same position
      - relations updated to promoted child
    errors:
      NODE_NOT_FOUND: path does not exist
      NOT_FOLDABLE: node has multiple children or has slots
    example:
      - fold:
          path: trip/details

  merge:
    description: combine sibling nodes into one
    fields:
      paths:
        type: list
        item_type: string
        required: true
      into:
        type: string
        required: true
        description: key for merged node (existing key or new)
    rules:
      - all nodes must be siblings
      - into is one of listed keys or a new key
      - slots combined (last listed wins on conflict)
      - children combined (kept as-is on key conflict)
      - source quotes combined
      - confidence set to minimum of all merged nodes
      - original nodes removed, merged node takes their place
    errors:
      NODE_NOT_FOUND: one or more paths missing
      NOT_SIBLINGS: nodes do not share parent
      INVALID_KEY: into not snake_case
    example:
      - merge:
          paths: [trip/food, trip/dining, trip/restaurants]
          into: dining

  # === Relations ===

  relate:
    description: add a directed semantic relation
    fields:
      from:
        type: string
        required: true
      to:
        type: string
        required: true
      type:
        type: string
        required: true
        enum: [causes, conditions, contrasts, follows, depends]
      confidence:
        type: number
        min: 0
        max: 1
        required: false
        default: 1.0
    rules:
      - both nodes must exist
      - no self-relations
      - no duplicate relations
      - causes/follows must not create cycle
    errors:
      NODE_NOT_FOUND: from or to does not exist
      SELF_RELATION: from equals to
      DUPLICATE_RELATION: exact relation exists
      CYCLE_DETECTED: would create causal/temporal cycle
    example:
      - relate:
          from: trip/dining
          to: trip/budget
          type: depends
          confidence: 0.8

  unrelate:
    description: remove a relation
    fields:
      from:
        type: string
        required: true
      to:
        type: string
        required: true
      type:
        type: string
        required: true
        enum: [causes, conditions, contrasts, follows, depends]
    rules:
      - no-op if relation does not exist
    example:
      - unrelate:
          from: trip/dining
          to: trip/budget
          type: depends

# ----------------------------------------------------------------------------
# Execution
# ----------------------------------------------------------------------------
execution:
  order: sequential             # operations execute top to bottom
  on_error: stop                # stop at first failed operation
  idempotent_ops: [unset, unrelate]  # no-op on missing target
  strict_ops: [set, add, drop, rename, clone, move, nest, split, fold, merge, relate]

# ----------------------------------------------------------------------------
# Document format
# ----------------------------------------------------------------------------
document:
  root_key: yops
  type: list of operations
  example:
    yops:
      - set:
          path: trip/dining/budget
          value: 2000
          source: "let's do 2000"
          from: T5
      - drop:
          path: trip/shopping
