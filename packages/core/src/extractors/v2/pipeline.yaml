  - id: nano_add_missing_key
    status: resolved_by_F8
    affects: [gpt-5.4-nano]
    discovered: 2026-04-22 (stability run, product-design fixture)
    hypothesis: >
      Nano emits `add` items where candidate.key and candidate.path_hint are
      both null/missing. The compiler previously hard-failed with "add intent
      requires candidate.key or candidate.path_hint".
    fix_site: packages/core/src/extractors/v2/compiler.ts::synthesizeAddPath
    resolution: >
      The compiler now synthesizes a deterministic slug path from the first
      short string value in candidate.values, falling back to item.id. A
      compile warning documents the synthesis. Nano × product-design
      verified 3/3 runs pass post-F8.

  - id: nano_update_on_missing_path
    status: resolved_by_F8
    affects: [gpt-5.4-nano]
    discovered: 2026-04-22 (stability run, react-debugging fixture)
    hypothesis: >
      In bootstrap mode (empty starting snapshot), nano emits `update` or
      `reinforce` intents on paths that don't yet exist. The engine then
      fails `populate`/`set` with "Path X does not exist".
    fix_site: packages/core/src/extractors/v2/compiler.ts::compileItem (bootstrap promotion)
    resolution: >
      In bootstrap mode the compiler now promotes `update` and `reinforce`
      intents to `add` — bootstrap has no pre-existing snapshot so the
      distinction is meaningless. The path is resolved from target_ref (the
      LLM's intended identifier) and passed through to the add path, which
      emits define + populate + set as needed. Nano × react-debugging
      verified 3/3 runs pass post-F8.

  - id: nested_path_scalar_collision
    status: dissolved_by_F12
    discovered: 2026-04-22 (F11 stability matrix, 3/54 remaining failures)
    affects: [claude-sonnet-4-6, gpt-5.4]
    hypothesis: >
      The model emits two items describing the same concept at different
      granularities. The first populates a string at some slot, the second
      tries to `add` a nested node at that same path. Was thought to be an
      apply-time structural conflict.
    resolution: >
      After F12 extended tryParseWithRepair to the inner _json field parse,
      the F11 matrix's 3 remaining failures ALL went away on the F12 re-run.
      Retrospect: those runs' inner children_json / values_json had been
      silently truncating mid-object (model hitting max_tokens), which the
      outer path had been tolerating but the inner path was not. The
      "already exists" error was a downstream symptom of upstream truncation
      producing short/partial strings that the model then re-described in a
      later item at a different granularity. Repairing the inner parse
      lets the first item land fully, and the collision never materializes.
    observability_note: >
      If this pattern ever resurfaces with a genuinely-structural collision
      (not truncation-driven), the fix options remain documented above:
      compile-time conflict detection, apply-time scalar-to-object coercion,
      or item-list merge-by-prefix.

  - id: anthropic_structured_output_empty
    status: resolved_by_F5
    affects: [claude-opus-4-6]
    hypothesis: >
      Opus sometimes returns an empty structured response (`transport: No
      structured data found in response`). Run-to-run flake. Anthropic's
      structured output path drops content on some inputs.
    fix_site: packages/core/src/providers/llm/claude.ts::generateStructuredViaText
