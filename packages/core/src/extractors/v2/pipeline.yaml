schema: t3x/extraction-pipeline-v2
version: 1

# Runtime source of truth for the V2 extraction pipeline.
# Purpose: every failure mode, every stage contract, every provider quirk
# lives here — so debugging, tests, and prompt tuning agree on one map.
#
# Invariant: the codes in `failures[].code` MUST match
# `EXTRACTION_FAILURE_CODES` in packages/core/src/extractors/v2/failures.ts.
# A conformance test should assert this.

stages:
  - id: normalize
    role: Tag turns with T1..TN, build turn_hash ↔ tag map
    source: packages/core/src/extractors/v2/normalization.ts
    deterministic: true
    input: PromptTurnInput[]
    output: { taggedTurns, turnHashByTag }
    may_emit_failures: []

  - id: build_prompt
    role: Assemble LLM prompt (system + user) per provider branch
    source: packages/core/src/extractors/v2/pipeline.ts::buildDraftPrompt
    deterministic: true
    input: { mode, providerId, turns, snapshot? }
    output: LLMPrompt
    may_emit_failures: []
    notes:
      - Prompt has a provider branch: anthropic+openai share one path,
        google gets its own with an explicit JSON example block.
      - openai receives an extra line enforcing candidate.values_json or
        candidate.slot+value_json on update/reinforce items.

  - id: generate_draft
    role: Call LLM; produce ProviderExtractionDraft JSON
    source: packages/core/src/extractors/v2/pipeline.ts::generateDraft
    deterministic: false
    input: { prompt, model, provider }
    output: { ok, draft | failure }
    calls: LLMProvider.generateStructured → fallback to generateFromPrompt → fallback to generate
    may_emit_failures: [transport, draft_parse, draft_schema]

  - id: validate_draft
    role: Zod-validate ProviderExtractionDraft, lift to canonical ExtractionDraft
    source: packages/core/src/extractors/v2/providerDraft.ts
    deterministic: true
    input: raw JSON
    output: { ok, draft | failure }
    may_emit_failures: [draft_schema, provenance]

  - id: compile
    role: Deterministically compile draft items into YOps operations
    source: packages/core/src/extractors/v2/compiler.ts
    deterministic: true
    input: { draft, sourceModel, extractedAt, turnHashByTag }
    output: { ok, ops, warnings | failure }
    may_emit_failures: [compile, domain_schema]
    notes:
      - compile failures with details.reaskable=true trigger a targeted-reask.

  - id: apply
    role: Apply compiled YOps to the base snapshot via t3x-yops engine
    source: packages/core/src/extractors/v2/extract-and-apply.ts
    deterministic: true
    input: { snapshot, ops }
    output: { ok, trees, relations | failure }
    may_emit_failures: [executable_structure]

retry:
  max_attempts: 2
  policy_source: packages/core/src/extractors/v2/pipeline.ts::shouldTargetedReask
  rules:
    - if: failure.retry.strategy == 'targeted_reask'
      action: rebuild prompt with targeted fix hints, re-run generate_draft
    - if: failure.code == 'compile' && failure.details.reaskable == true
      action: targeted-reask
    - else: return failure

# Canonical failure taxonomy. Must match failures.ts.
failures:
  - code: transport
    when: LLM provider call fails at the HTTP/SDK layer (auth, network, empty response)
    retry: backoff (up to 3)
    reaskable: false
    model_scope: any
    examples:
      - "[claude] API request failed: 401 invalid x-api-key"
      - "[google-ai] No content in response"

  - code: draft_parse
    when: Provider returned text that is not valid JSON, or a *_json field contains invalid JSON
    retry: targeted_reask (up to 2)
    reaskable: true
    model_scope: any (biased toward small models)
    examples:
      - "Provider field candidate.value_json is not valid JSON"

  - code: draft_schema
    when: Parsed JSON violates ProviderExtractionDraftSchema (Zod)
    retry: targeted_reask (up to 2)
    reaskable: true
    model_scope: any
    examples:
      - "Unrecognized key: 'slot'" (haiku placing slot at the wrong level)

  - code: provenance
    when: draft.items[].evidence.turn_tag does not resolve to a known turn
    retry: targeted_reask (up to 2)
    reaskable: true
    model_scope: any

  - code: compile
    when: Deterministic compiler cannot map a draft item to a YOps op
    retry: targeted_reask if details.reaskable=true else none
    reaskable: conditional
    model_scope: any

  - code: executable_structure
    when: Compiled ops violate YOps engine invariants on apply (e.g. duplicate add path)
    retry: none
    reaskable: false
    model_scope: any
    examples:
      - "Path 'games/heroes_of_the_storm' already exists"
      - "Path 'game' already exists"
    open_question: Should compiler fold duplicate add ops into one (warn) instead of letting engine reject?

  - code: domain_schema
    when: Compiled result violates downstream domain schema
    retry: none
    reaskable: false
    model_scope: any

# Provider adapter contract.
# Each provider adapter must implement the LLMProvider interface in
# packages/core/src/llm/types.ts. Quirks that affect v2 behavior:
providers:
  - id: anthropic
    source: packages/core/src/providers/llm/claude.ts
    supports:
      generate: true
      generateFromPrompt: true
      generateStructured: true
    models:
      - id: claude-sonnet-4-6
        canonical: true
        known_issues:
          - "(resolved by F1) Emitted `{name, type}` shape inside children_json. Now normalized deterministically in providerDraft.ts::canonicalizeChildShape."
      - id: claude-opus-4-6
        canonical: true
        known_issues:
          - "(resolved by F5) Intermittently returned empty structured responses. Now caught by generateStructuredViaText fallback in the Claude adapter."
        notes:
          - "Slow: typical ~26s, up to ~58s when F5 fallback triggers a second HTTP call. Well above the 10s SLO."
      - id: claude-haiku-4-5-20251001
        canonical: true
        known_issues:
          - "(resolved by F1) Same as sonnet — children_json shape normalized in providerDraft.ts::canonicalizeChildShape."

  - id: openai
    source: packages/core/src/providers/llm/openai.ts
    supports:
      generate: true
      generateFromPrompt: true
      generateStructured: true
    prompt_quirks:
      - "User message appends an extra line enforcing values_json/slot presence on update/reinforce."
    models:
      - id: gpt-5.4
      - id: gpt-5.4-mini
      - id: gpt-5.4-nano
        known_issues:
          - "(resolved by F3) Emits plain unquoted scalars in candidate.value_json. Now deterministically repaired in providerDraft.ts::repairMalformedJsonField."

  - id: google
    source: packages/core/src/providers/llm/gemini.ts
    supports:
      generate: true
      generateFromPrompt: true
      generateStructured: true
    prompt_quirks:
      - "Gets its own prompt branch with an explicit JSON example block and stricter _json field rules."
    models:
      - id: gemini-2.5-pro
        known_issues:
          - "(resolved by F4) Default implicit thinking budget exhausted maxOutputTokens before content. Now capped at 256 via buildThinkingConfig."
      - id: gemini-3-flash-preview
      - id: gemini-3.1-flash-lite-preview

# Architectural principles. These bind the fix strategy.
principles:
  - id: deterministic_over_prompt
    text: >
      Prefer deterministic wrappers over prompt engineering. Each LLM command
      is simple; the deterministic flow around it (normalizers, shape-lifters,
      repairers, compilers) does the heavy lifting. Per-provider prompt
      branches are a last resort, not a default tool.
    extends: The project's core invariant that "the mutation layer is 100% deterministic and never depends on an LLM," applied to the extraction layer.
    implications:
      - One simple prompt per stage. Avoid per-provider branches unless no deterministic fix exists.
      - Accept wider input from the LLM; narrow it deterministically to the canonical shape.
      - A misbehaving model is fixed by extending the normalizer/repairer/compiler, not by writing a new prompt variant.

# Pipeline-level invariants. Violations are bugs, not flakes.
invariants:
  - id: compiler_total
    text: The compiler must be a total function over validated ExtractionDraft inputs, or emit a reaskable `compile` failure.
  - id: apply_deterministic
    text: applyYOps(snapshot, ops) is deterministic — same inputs, same outputs, always.
  - id: reask_bounded
    text: Targeted reask is bounded by max_attempts (currently 2). After budget, return the last failure.
  - id: no_llm_below_generate
    text: No stage below generate_draft may call an LLM. Compile and apply are deterministic.
  - id: draft_provenance
    text: Every draft item's evidence.turn_tag must resolve via turnHashByTag or the pipeline fails with `provenance`.

# Operational assessment. Updated by the multi-model harness; treated as
# evidence, not truth. Numbers are fixture-specific (hots-conversation, 8 turns).
current_status:
  fixture: packages/core/src/__tests__/fixtures/hots-conversation.json
  last_run: 2026-04-22 (post-F5)
  harness: packages/core/scripts/e2e-multi-model.ts
  pass_rate: 9/9 single-run; opus verified 3/3
  notes:
    - All cataloged models extract end-to-end on the standard fixture.
    - Zero per-provider prompt branches were introduced across F1–F5.
    - F1 — deterministic children_json shape normalizer (providerDraft.ts).
    - F2 — compiler dedupe of duplicate define ops (compiler.ts).
    - F3 — value_json repairer for plain-scalar emissions (providerDraft.ts).
    - F4 — explicit thinking budget for all Gemini `pro` models so output
      has room under the maxOutputTokens cap (providers/llm/gemini.ts).
    - F5 — Claude adapter fallback: if generateStructured returns no usable
      structured data, retry via generateFromPrompt and extract JSON from
      the text response. Opus no longer flakes. Harness gained --slo-ms
      (default 10000) and per-model latency summary.
  results:
    passing:
      - claude-sonnet-4-6
      - claude-opus-4-6
      - claude-haiku-4-5-20251001
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.4-nano
      - gemini-2.5-pro
      - gemini-3-flash-preview
      - gemini-3.1-flash-lite-preview
    failing: []

# Latency expectations per model on the 8-turn hots-conversation fixture.
# Values are typical single-run timings post-F5. "slo" marks whether the
# model reliably stays under the default 10s SLO. Slow models are not
# failures — they're a signal that either the provider is spending budget
# on thinking/reasoning or the pipeline is doing extra work (e.g. F5 fallback).
latency_profile:
  slo_ms: 10000
  fast: # ≤ 10s typical
    - { model: gpt-5.4-mini, typical_ms: 5000 }
    - { model: gpt-5.4-nano, typical_ms: 9600 }
    - { model: gemini-3-flash-preview, typical_ms: 4400 }
    - { model: gemini-3.1-flash-lite-preview, typical_ms: 3900 }
  slow: # > 10s typical — worth watching
    - { model: claude-haiku-4-5-20251001, typical_ms: 11000 }
    - { model: gpt-5.4, typical_ms: 14700 }
    - { model: gemini-2.5-pro, typical_ms: 15000 }
    - { model: claude-opus-4-6, typical_ms: 26000, note: "May take 50s+ when F5 fallback kicks in" }
    - { model: claude-sonnet-4-6, typical_ms: 37000 }

# Failure clusters guide the fix plan. Each cluster = one follow-up PR.
clusters:
  - id: anthropic_ignores_json_fields
    status: resolved_by_F1
    affects: [claude-sonnet-4-6, claude-haiku-4-5-20251001]
    hypothesis: >
      Claude models ignore the "use *_json fields as JSON strings" rule in
      the prompt and emit canonical ExtractionDraft shapes instead —
      `candidate.children` as an array of objects with `{name, type, …}`
      keys, rather than `candidate.children_json` as a stringified array.
      The Zod schema then rejects the unrecognized keys.
    fix_strategy: deterministic_wrapper
    candidates:
      - PREFERRED — Add a deterministic shape-normalizer before Zod validation that accepts BOTH ProviderExtractionDraft AND canonical ExtractionDraft, lifting canonical shape into _json string fields.
      - AVOID — Per-provider prompt branch (violates deterministic_over_prompt principle).
      - AVOID — Loosening the schema (hides the shape contract).
    fix_site: packages/core/src/extractors/v2/providerDraft.ts (pre-validation normalizer)

  - id: duplicate_add_path
    status: resolved_by_F2
    affects: [claude-sonnet-4-6, claude-opus-4-6, gpt-5.4, gpt-5.4-mini]
    scope_note: >
      After F1 landed, this cluster expanded — Anthropic models now reach the
      compile stage and hit the same duplicate-path issue OpenAI models already
      exposed. Resolved by compiler.ts::dedupeDefineOps which folds repeat
      define ops on the same path and emits a warning. Populate/set ops from
      dropped defines are preserved and merge additively into the first-defined
      node.
    hypothesis: >
      Compiler does not dedupe multiple `add` ops to the same path. Previously
      observed across models/providers; after the 2026-04 main merge the frequency
      dropped — still hits gpt-5.4 reproducibly.
    fix_strategy: deterministic_wrapper
    candidates:
      - PREFERRED — Compiler folds duplicate `add` ops targeting the same path (keep first, warn on rest).
      - AVOID — Prompt-side "forbid duplicates" instruction (compilers should be total, prompts are advisory).
    fix_site: packages/core/src/extractors/v2/compiler.ts

  - id: nano_value_json
    status: resolved_by_F3
    affects: [gpt-5.4-nano]
    hypothesis: >
      Small model can't emit correctly escaped JSON strings inside
      candidate.value_json. Emits plain unquoted scalars
      (e.g. `destroy_enemy_core/base` instead of `"destroy_enemy_core/base"`).
    fix_site: packages/core/src/extractors/v2/providerDraft.ts::repairMalformedJsonField
    resolution: >
      Deterministic repair in parseJsonField: when JSON.parse fails on
      candidate.value_json AND the raw content does not start with `{`, `[`,
      or `"`, treat it as a plain string literal. Object-/array-shaped fields
      (values_json, children_json) are not repaired — their shape contract
      is too strict to guess safely.

  - id: anthropic_structured_output_empty
    status: resolved_by_F5
    affects: [claude-opus-4-6]
    hypothesis: >
      Opus sometimes returns an empty structured response (`transport: No
      structured data found in response`). Run-to-run flake. Anthropic's
      structured output path drops content on some inputs.
    fix_site: packages/core/src/providers/llm/claude.ts::generateStructuredViaText
    resolution: >
      Claude adapter now catches the "No structured data" failure and
      transparently retries via generateFromPrompt + extractJsonBlock
      (which handles bare JSON, ```json fences, and JSON-after-preamble).
      No prompt change. Opus verified 3/3 runs pass post-F5.

  - id: gemini_pro_empty
    status: resolved_by_F4
    affects: [gemini-2.5-pro]
    hypothesis: >
      Pro models default to a large implicit thinking budget that can exhaust
      maxOutputTokens before the model emits any content. The adapter's
      buildThinkingConfig only covered `3.1-pro` explicitly, so `2.5-pro`
      fell through to the API default.
    fix_site: packages/core/src/providers/llm/gemini.ts::buildThinkingConfig
    resolution: >
      Broaden the `pro` match so every Pro model gets thinkingBudget: 256.
      No prompt change. gemini-2.5-pro verified 3/3 runs pass.
