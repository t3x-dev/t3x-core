schema: t3x/extraction-pipeline-v2
version: 1

# ============================================================================
# Architecture & debugging document for the V2 extraction pipeline.
# ============================================================================
#
# This file is NOT loaded at runtime. The runtime is the TypeScript code
# under packages/core/src/extractors/v2/. In particular:
#
#   - The prompt the LLM actually sees is built by buildDraftPrompt
#     in pipeline.ts (one provider-agnostic template, F9).
#   - The retry policy is shouldTargetedReask + buildTargetedReaskPrompt
#     in pipeline.ts.
#   - The failure code enum is EXTRACTION_FAILURE_CODES in failures.ts.
#
# Use this YAML to ground discussions, debugging walkthroughs, and post-mortems.
# When the runtime changes, this file should be updated with it. Sections that
# describe per-provider prompt branches, embedded JSON examples, or specific
# wording belong in code reviews of pipeline.ts — not here — because they will
# drift the moment a deterministic fix lands.
#
# Loose alignment, not contract: the codes in `failures[].code` are intended
# to match EXTRACTION_FAILURE_CODES, but there is no automated assertion. If
# you change the enum, please update this file in the same PR.

stages:
  - id: normalize
    role: Tag turns with T1..TN, build turn_hash ↔ tag map
    source: packages/core/src/extractors/v2/normalization.ts
    deterministic: true
    input: PromptTurnInput[]
    output: { taggedTurns, turnHashByTag }
    may_emit_failures: []

  - id: build_prompt
    role: Assemble a single provider-agnostic LLM prompt (system + user)
    source: packages/core/src/extractors/v2/pipeline.ts::buildDraftPrompt
    deterministic: true
    input: { mode, providerId, turns, snapshot? }
    output: LLMPrompt
    may_emit_failures: []
    notes:
      - "Single template for all providers. The `providerId` is part of
        the input but is no longer branched on (F9). Drift previously
        handled in the prompt is now handled deterministically — see
        providerDraft.ts (shape normalizer, F6 loose normalizer, F3
        repairer) and compiler.ts (F2 dedupe, F8 tolerance, child-key
        validation, path normalisation)."

  - id: generate_draft
    role: Call LLM; produce ProviderExtractionDraft JSON
    source: packages/core/src/extractors/v2/pipeline.ts::generateDraft
    deterministic: false
    input: { prompt, model, provider }
    output: { ok, draft | failure }
    calls: LLMProvider.generateStructured → fallback to generateFromPrompt → fallback to generate
    may_emit_failures: [transport, draft_parse, draft_schema]

  - id: validate_draft
    role: Zod-validate ProviderExtractionDraft, lift to canonical ExtractionDraft
    source: packages/core/src/extractors/v2/providerDraft.ts
    deterministic: true
    input: raw JSON
    output: { ok, draft | failure }
    may_emit_failures: [draft_schema, provenance]

  - id: compile
    role: Deterministically compile draft items into YOps operations
    source: packages/core/src/extractors/v2/compiler.ts
    deterministic: true
    input: { draft, sourceModel, extractedAt, turnHashByTag }
    output: { ok, ops, warnings | failure }
    may_emit_failures: [compile, domain_schema]
    notes:
      - compile failures with details.reaskable=true trigger a targeted-reask.

  - id: apply
    role: Apply compiled YOps to the base snapshot via t3x-yops engine
    source: packages/core/src/extractors/v2/extract-and-apply.ts
    deterministic: true
    input: { snapshot, ops }
    output: { ok, trees, relations | failure }
    may_emit_failures: [executable_structure]

retry:
  max_attempts: 2
  policy_source: packages/core/src/extractors/v2/pipeline.ts::shouldTargetedReask
  rules:
    - if: failure.retry.strategy == 'targeted_reask'
      action: rebuild prompt with targeted fix hints, re-run generate_draft
    - if: failure.code == 'compile' && failure.details.reaskable == true
      action: targeted-reask
    - else: return failure

# Canonical failure taxonomy. Must match failures.ts.
failures:
  - code: transport
    when: LLM provider call fails at the HTTP/SDK layer (auth, network, empty response)
    retry: backoff (up to 3)
    reaskable: false
    model_scope: any
    examples:
      - "[claude] API request failed: 401 invalid x-api-key"
      - "[google-ai] No content in response"

  - code: draft_parse
    when: Provider returned text that is not valid JSON, or a *_json field contains invalid JSON
    retry: targeted_reask (up to 2)
    reaskable: true
    model_scope: any (biased toward small models)
    examples:
      - "Provider field candidate.value_json is not valid JSON"

  - code: draft_schema
    when: Parsed JSON violates ProviderExtractionDraftSchema (Zod)
    retry: targeted_reask (up to 2)
    reaskable: true
    model_scope: any
    examples:
      - "Unrecognized key: 'slot'" (haiku placing slot at the wrong level)

  - code: provenance
    when: draft.items[].evidence.turn_tag does not resolve to a known turn
    retry: targeted_reask (up to 2)
    reaskable: true
    model_scope: any

  - code: compile
    when: Deterministic compiler cannot map a draft item to a YOps op
    retry: targeted_reask if details.reaskable=true else none
    reaskable: conditional
    model_scope: any

  - code: executable_structure
    when: Compiled ops violate YOps engine invariants on apply (e.g. duplicate add path)
    retry: none
    reaskable: false
    model_scope: any
    examples:
      - "Path 'games/heroes_of_the_storm' already exists"
      - "Path 'game' already exists"
    open_question: Should compiler fold duplicate add ops into one (warn) instead of letting engine reject?

  - code: domain_schema
    when: Compiled result violates downstream domain schema
    retry: none
    reaskable: false
    model_scope: any

# Provider adapter contract.
# Each provider adapter must implement the LLMProvider interface in
# packages/core/src/llm/types.ts. Quirks that affect v2 behavior:
providers:
  - id: anthropic
    source: packages/core/src/providers/llm/claude.ts
    supports:
      generate: true
      generateFromPrompt: true
      generateStructured: true
    models:
      - id: claude-sonnet-4-6
        canonical: true
        known_issues:
          - "(resolved by F1) Emitted `{name, type}` shape inside children_json. Now normalized deterministically in providerDraft.ts::canonicalizeChildShape."
      - id: claude-opus-4-6
        canonical: true
        known_issues:
          - "(resolved by F5) Intermittently returned empty structured responses. Now caught by generateStructuredViaText fallback in the Claude adapter."
        notes:
          - "Slow: typical ~26s, up to ~58s when F5 fallback triggers a second HTTP call. Well above the 10s SLO."
      - id: claude-haiku-4-5-20251001
        canonical: true
        known_issues:
          - "(resolved by F1) Same as sonnet — children_json shape normalized in providerDraft.ts::canonicalizeChildShape."

  - id: openai
    source: packages/core/src/providers/llm/openai.ts
    supports:
      generate: true
      generateFromPrompt: true
      generateStructured: true
    # No prompt_quirks remain after F9 collapsed the per-provider branches.
    # The previous "extra line enforcing values_json/slot presence on
    # update/reinforce" guidance now lives in the targeted-reask prompt
    # that fires only when the compiler emits a reaskable compile failure
    # — see pipeline.ts::buildTargetedReaskPrompt.
    models:
      - id: gpt-5.4
      - id: gpt-5.4-mini
      - id: gpt-5.4-nano
        known_issues:
          - "(resolved by F3) Emits plain unquoted scalars in candidate.value_json. Now deterministically repaired in providerDraft.ts::repairMalformedJsonField."

  - id: google
    source: packages/core/src/providers/llm/gemini.ts
    supports:
      generate: true
      generateFromPrompt: true
      generateStructured: true
    # No prompt_quirks remain after F9. The "explicit JSON example block
    # + stricter _json field rules" Google used to receive is gone; what
    # the model emits is now coerced deterministically by providerDraft.ts
    # (normalizeLooseProviderDraft, canonicalizeChildShape) and the F12
    # JSON repair pipeline.
    models:
      - id: gemini-2.5-pro
        known_issues:
          - "(resolved by F4) Default implicit thinking budget exhausted maxOutputTokens before content. Now capped at 256 via buildThinkingConfig."
      - id: gemini-3-flash-preview
      - id: gemini-3.1-flash-lite-preview

# Five-layer framework abstraction (extracted from F1–F13).
# This is the pattern the pipeline has converged on. New work should slot
# into one of these layers; if it doesn't, it's a signal the abstraction
# needs to grow rather than a leaky bypass.
framework:
  - layer: transport
    role: One simple LLM command per provider. No prompt engineering for
      drift — adapters handle provider quirks in code.
    primitives:
      - packages/core/src/providers/llm/{claude,openai,gemini}.ts
      - LLMProviderError with typed `code` + optional `details` payload
      - shared helpers — jsonExtract (find JSON in text), jsonRepair (F12
        BAML-SAP-inspired repairs — comments, trailing commas, unbalanced
        brackets)
  - layer: shape_recovery
    role: >
      Narrow wider-than-expected LLM output to the strict canonical shape.
      Applied progressively, cheap to expensive; each step is
      string-aware, idempotent, and testable in isolation.
    primitives:
      - extractJsonBlock (fences, preamble, balanced scan)
      - tryParseWithRepair (F12: JSON.parse + progressive repairs)
      - normalizeLooseProviderDraft (F6: schema/version/item shape
        coercion from drifted Claude output)
      - canonicalizeChildShape (F1: children_json shape coercion)
      - repairMalformedJsonField (F3: plain-scalar value_json for small
        models)
      - liftProviderDraftToExtractionDraft (provider→canonical lift with
        F11 array-to-value and child-key synthesis)
  - layer: pipeline_orchestration
    role: Named stages with typed failure codes and bounded retry. Every
      failure code has a documented retry policy.
    primitives:
      - 6 stages (normalize → buildPrompt → generateDraft → validateDraft
        → compile → apply)
      - ExtractionFailureCode union + per-code RetryDecision
      - buildTargetedReaskPrompt (F13: includes prior assistant draft +
        structured issue bullets, max 2 attempts)
      - dedupeDefineOps (F2: compiler-level collision handling)
      - synthesizeAddPath + bootstrap update→add promotion (F8)
  - layer: contract_choice
    role: Caller picks strict vs resilient based on UX needs.
    primitives:
      - extractAndApply — strict `{ok} | {ok:false,failure}` for tests
        and internal retry
      - extractAndApplyResilient (F10) — always `{ok:true,degraded?}`
        for user-facing callers; base snapshot preserved unchanged on
        degrade
  - layer: observability
    role: Diagnostic context flows end-to-end so failures are explainable.
    primitives:
      - LLMProviderError.details carries rawText / jsonText / issues /
        priorDraftText
      - mapProviderErrorToExtractionFailure forwards those details
      - this pipeline.yaml as architecture / debugging document for stages /
        failure codes / clusters / principles (NOT a runtime contract — see
        the file header)
      - harness (--fixtures-dir, --runs=N, --slo-ms, --dump-dir) for
        empirical validation

# Architectural principles. These bind the fix strategy.
principles:
  - id: deterministic_over_prompt
    text: >
      Prefer deterministic wrappers over prompt engineering. Each LLM command
      is simple; the deterministic flow around it (normalizers, shape-lifters,
      repairers, compilers) does the heavy lifting. Per-provider prompt
      branches are a last resort, not a default tool.
    extends: The project's core invariant that "the mutation layer is 100% deterministic and never depends on an LLM," applied to the extraction layer.
    implications:
      - One simple prompt per stage. Avoid per-provider branches unless no deterministic fix exists.
      - Accept wider input from the LLM; narrow it deterministically to the canonical shape.
      - A misbehaving model is fixed by extending the normalizer/repairer/compiler, not by writing a new prompt variant.

# Architecture review findings (2026-04-22). Not failures, but debt worth paying
# down in a follow-up refactor. Each is a deviation from clean layering or the
# deterministic_over_prompt principle.
architecture_review:
  - id: per_provider_prompt_branch
    severity: principle_violation
    status: resolved_by_F9
    site: packages/core/src/extractors/v2/pipeline.ts::buildDraftPrompt
    problem: >
      One prompt for anthropic+openai, another for google; openai got an extra
      line about values_json/slot. With F2/F3 catching both issues
      deterministically, the per-provider hints became removable.
    resolution: >
      F9 collapsed buildDraftPrompt to a single provider-agnostic template.
      The drift the prompt used to enforce now lives entirely in the
      deterministic flow (providerDraft.ts normalizers, compiler.ts
      validators, jsonRepair.ts). Stability harness verified 54/54 across
      6 fixtures × 9 models post-F12.

  - id: transport_layer_duplication
    severity: high_debt
    site: packages/core/src/providers/llm/{claude,openai,gemini}.ts
    problem: >
      ~200 lines duplicated across each provider: getProxyUrl, fetchWithProxy,
      AbortController + 60s timeout, error wrapping, resolveConflict prompt
      (literally copy-pasted). No shared HttpLLMProvider base.
    recommendation: >
      Extract a base class/helper that owns fetch + timeout + error wrapping.
      Each provider implements just: request body builder, response parser.

  - id: asymmetric_structured_fallback
    severity: inconsistency
    status: partially_resolved_by_F7
    site: openai.ts (now has F5-style fallback) and claude.ts (F5); gemini.ts still lacks it
    problem: >
      F5's retry-on-empty-structured originally lived only in the Claude
      adapter. OpenAI and Gemini threw on similar failures. The stability run
      revealed OpenAI exhibited the same failure mode.
    progress: >
      F7 mirrored the F5 pattern into the OpenAI adapter and extracted
      extractJsonBlock into a shared helper (providers/llm/jsonExtract.ts)
      used by both Claude and OpenAI. Gemini still lacks the fallback but
      no stability failure has pointed at it yet.

  - id: layer_inversion
    severity: layer_violation
    site: packages/core/src/providers/llm/openai.ts imports from extractors/v2
    problem: >
      openai.ts:8 imports buildOpenAIChatCompletionBody from
      extractors/v2/providerAdapters. Transport layer (lower) depends on
      pipeline layer (upper).
    recommendation: >
      Move buildOpenAIChatCompletionBody into providers/llm/ or a neutral location.

  - id: brittle_error_matching
    severity: minor
    site: packages/core/src/providers/llm/claude.ts::generateStructured
    problem: >
      F5's retry trigger uses error.message.endsWith('No structured data
      found in response'). String matching across a [providerId] prefix is
      brittle.
    recommendation: >
      Add a typed `code` on LLMProviderError (e.g. EMPTY_STRUCTURED) and match
      on that instead of the message.

  - id: dropped_raw_on_failure
    severity: observability
    status: resolved_by_F6
    site: claude.ts, providerAdapters.ts
    problem: >
      When JSON didn't match schema, we lost the raw content — it never
      reached failure.details. Made diagnosis hard.
    progress: >
      F6 added an optional `details` field to LLMProviderError, wired
      rawText/jsonText/issues through generateStructuredViaText, and updated
      mapProviderErrorToExtractionFailure to forward provider details.

  - id: configurable_timeout
    severity: minor
    site: all 3 providers
    problem: >
      60s timeout hardcoded in 9 places. Slow models (opus fallback ~58s,
      sonnet on long fixtures ~77s) bump this ceiling.
    recommendation: >
      Add timeoutMs to LLMGenerateOptions, default 60000, allow override.

  - id: regression_gate
    severity: foundational
    status: resolved_by_F15
    site: packages/core/src/__tests__/v2-golden/
    problem: >
      The pipeline had no end-to-end regression test. Unit tests cover each
      stage in isolation (compiler, lift, normalizer). The multi-model
      harness covers real LLM behavior but is manual, expensive, and flaky
      in CI. Nothing gated a structural PR against unintentional output drift.
    progress: >
      F15 introduces a golden-eval harness. Each golden is a directory with
      three JSON files: turns.json (input), provider-response.json (mocked
      LLM reply), expected.json (expected draft / op kinds / snapshot
      trees). The harness (golden.test.ts) auto-discovers directories,
      mocks the provider to replay the recorded response, runs
      extractAndApply end-to-end, and asserts structural equality with the
      expected file. Deterministic — no network, no API keys, no cost.
      Initial seed: airport-issue (nested children) + trip-planning-minimal
      (value_json array → value slot). Adding a new golden = drop a new
      directory; no code change.

  - id: openai_refusal_first_class
    severity: observability
    status: resolved_by_F14
    site: packages/core/src/providers/llm/openai.ts + extract-and-apply-resilient.ts
    problem: >
      OpenAI's Structured Outputs API returns a `refusal` field on the
      assistant message when the model declines to produce structured
      output (safety, policy, ambiguity). The adapter previously collapsed
      this into the generic "No content in response" path and routed it
      through the plain-text retry — wasting a call and burying the
      semantic signal under a generic "extraction failed" diagnostic.
    progress: >
      F14 detects message.refusal in the OpenAI structured response path
      and throws an LLMProviderError with code='REFUSAL' and
      details.refusalText = the refusal string. The outer
      generateStructured catch does NOT route refusals into the plain-text
      fallback (retrying the same prompt won't help). extractAndApplyResilient
      promotes the failure to stage='refusal' in the degraded result and
      carries the refusalText through for UI surfaces to render verbatim.
      Users see WHY the model refused instead of a generic error.

  - id: reask_missing_prior_context
    severity: resilience
    status: resolved_by_F13
    site: packages/core/src/extractors/v2/pipeline.ts::buildTargetedReaskPrompt
    problem: >
      The targeted-reask prompt listed validation issues but did not include
      the prior assistant output. The model had to re-derive the whole draft
      from scratch — losing whatever was correct in the first attempt.
      Pydantic AI's ModelRetry and Instructor's retry-on-ValidationError
      both feed the prior output back so the model can fix incrementally.
    progress: >
      F13 threads a priorDraftText through the draft_schema failure path
      (captured from the adapter-returned payload when rawText isn't
      available) and prepends it as an assistant message in the reask
      prompt, before the user correction. The conversation now reads
      user → assistant (prior draft) → user (fix: …), matching the
      Pydantic AI / Instructor reask shape.

  - id: json_level_coercion
    severity: resilience
    status: resolved_by_F12
    site: packages/core/src/providers/llm/jsonRepair.ts
    problem: >
      LLM-emitted JSON routinely contains trailing commas, // or /* */ comments,
      or gets truncated mid-object so closing brackets are missing. JSON.parse
      rejects these outright even when the underlying structure is obvious.
      BAML's Schema-Aligned Parser (SAP) popularised the idea that a repair
      pass before strict validation absorbs most of these at near-zero cost.
    progress: >
      F12 adds jsonRepair.ts with three narrow, string-aware, idempotent
      repair passes — stripJsonComments, stripTrailingCommas,
      closeUnbalancedBrackets — and a tryParseWithRepair helper that reports
      which repairs fired. Wired into Claude's generateStructuredViaOutputConfig
      text-block fallback, both adapters' generateStructuredViaText paths, and
      pipeline.ts's plain-text + extractProviderRawJson paths. Preserves raw
      JSON.parse semantics for valid input (no repairs applied).

# Public extraction contracts.
contracts:
  - id: strict
    entry: extractAndApply (packages/core/src/extractors/v2/extract-and-apply.ts)
    shape: "{ ok: true, draft, compiled, snapshot, turnHashByTag } | { ok: false, failure, turnHashByTag }"
    use_for: Tests, internal retry logic, and any caller that must differentiate success from failure.

  - id: resilient (F10)
    entry: extractAndApplyResilient (packages/core/src/extractors/v2/extract-and-apply-resilient.ts)
    shape: "{ ok: true, draft, compiled, snapshot, turnHashByTag, degraded? }"
    use_for: User-facing extraction (API routes, MCP tools, WebUI). Guarantees `ok: true` on every call — if the pipeline cannot produce a real extraction, the result carries an empty draft, empty compiled plan, the unchanged base snapshot, and a `degraded` field with the failure stage/code/message and optional rawText for diagnosis. Never surfaces "broken" to the user.
    degradation_policy: >
      Every failure from the strict contract is converted into a degraded
      result. This includes transport errors (auth / network / empty response),
      draft_parse / draft_schema, provenance, compile, and apply
      (executable_structure). The base snapshot is returned unchanged so a
      transient failure never blows away existing incremental data.

# Pipeline-level invariants. Violations are bugs, not flakes.
invariants:
  - id: compiler_total
    text: The compiler must be a total function over validated ExtractionDraft inputs, or emit a reaskable `compile` failure.
  - id: apply_deterministic
    text: applyYOps(snapshot, ops) is deterministic — same inputs, same outputs, always.
  - id: reask_bounded
    text: Targeted reask is bounded by max_attempts (currently 2). After budget, return the last failure.
  - id: no_llm_below_generate
    text: No stage below generate_draft may call an LLM. Compile and apply are deterministic.
  - id: draft_provenance
    text: Every draft item's evidence.turn_tag must resolve via turnHashByTag or the pipeline fails with `provenance`.

# Operational assessment. Updated by the multi-model harness; treated as
# evidence, not truth. Numbers are fixture-specific (hots-conversation, 8 turns).
current_status:
  fixtures:
    - packages/core/src/__tests__/fixtures/hots-conversation.json
    - packages/core/src/__tests__/fixtures/react-debugging.json
    - packages/core/src/__tests__/fixtures/trip-planning.json
    - packages/core/src/__tests__/fixtures/science-astronomy.json
    - packages/core/src/__tests__/fixtures/product-design.json
    - packages/core/src/__tests__/fixtures/recipe-cooking.json
  last_run: 2026-04-22 (F12 stability, 6 fixtures × 9 models = 54 runs)
  harness: packages/core/scripts/e2e-multi-model.ts
  pass_rate: 54/54 (100%) strict; 54/54 (100%) resilient
  progression:
    - Pre-F1 (baseline): 3/9 on hots-conversation
    - Post-F1–F5: 9/9 on hots-conversation
    - Post-F1–F6 (stability review, 6 fixtures): 49/54
    - Post-F9 (simplified prompt, no other changes): 42/54 (regression — prompt rules were load-bearing)
    - Post-F11 (lift tolerance added): 51/54
    - Post-F12 (JSON repair on outer + inner _json fields): **54/54** ← current
  notes:
    - F9 collapsed the prompt to one provider-agnostic template. The drift
      rules the prompt used to carry are now handled deterministically by
      F1/F3/F6/F8/F11/F12 normalizers and repairers.
    - F10 adds the resilient extractAndApplyResilient contract — callers
      see ok:true on every call even when the strict pipeline fails.
    - F11 adds lift-step tolerance: array-in-values → value slot, missing
      child key → synthesized from first string value.
    - F12 adds BAML-SAP-style deterministic JSON repair (strip comments,
      strip trailing commas, close unbalanced brackets) to every LLM→JSON
      parse site — outer JSON.parse + inner _json field parses.
      nested_path_scalar_collision cluster dissolved once inner _json
      repair caught the truncated-children cases that had been surfacing
      as downstream apply-time conflicts.
  results:
