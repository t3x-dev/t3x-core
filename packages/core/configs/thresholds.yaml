# Evidence Confidence Thresholds (v2.0)
#
# These thresholds determine when to auto-apply, suggest, or ignore findings

# Auto-apply thresholds (highest confidence required)
# Findings meeting both criteria are automatically accepted
auto_apply:
  # Minimum confidence score (0.0 - 1.0)
  # Finding must score at least this high to be considered
  confidence: 0.78

  # Minimum margin between top-1 and top-2 evidence
  # Prevents auto-applying when two evidence scores are very close
  # (indicates uncertainty)
  margin: 0.08

# Suggest thresholds (medium confidence)
# Findings in this range are shown to user for manual review
suggest:
  min_confidence: 0.60
  max_confidence: 0.78

# Ignore thresholds (low confidence)
# Findings below this are filtered out
ignore:
  max_confidence: 0.60

# Recency decay parameters
recency:
  # Half-life in hours for exponential decay
  # After this many hours, evidence score is reduced by 50%
  half_life_hours: 168  # 1 week

# BM25 normalization
bm25:
  # Sigmoid steepness parameter
  # Higher = sharper transition between low/high scores
  k: 5.0

  # Sigmoid midpoint
  # BM25 scores around this value map to 0.5
  x0: 3.0

# Notes:
# - Thresholds calibrated on gold dataset
# - auto_apply_confidence=0.78 achieves ~70-80% auto-apply rate
# - suggest range (0.60-0.78) captures edge cases for human review
# - margin check prevents false positives when evidence is ambiguous
