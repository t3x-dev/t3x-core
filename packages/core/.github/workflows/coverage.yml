name: Code Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    name: Generate Coverage Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            sdk/python/setup.py

      # CLI Coverage
      - name: Install CLI dependencies
        working-directory: ./cli
        run: npm ci

      - name: Build CLI
        working-directory: ./cli
        run: npm run build

      - name: Run CLI tests with coverage
        working-directory: ./cli
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload CLI coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cli/coverage/lcov.info
          flags: cli
          name: CLI Coverage

      # Python SDK Coverage
      - name: Install Python SDK dependencies
        working-directory: ./sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest-cov

      - name: Run Python tests with coverage
        working-directory: ./sdk/python
        run: pytest --cov=t3x --cov-report=xml --cov-report=term

      - name: Upload Python SDK coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./sdk/python/coverage.xml
          flags: python-sdk
          name: Python SDK Coverage

      # JavaScript SDK Coverage
      - name: Install JS SDK dependencies
        working-directory: ./sdk/javascript
        run: npm ci

      - name: Build JS SDK
        working-directory: ./sdk/javascript
        run: npm run build

      - name: Run JS SDK tests with coverage
        working-directory: ./sdk/javascript
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload JS SDK coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./sdk/javascript/coverage/lcov.info
          flags: js-sdk
          name: JavaScript SDK Coverage

      # Generate combined coverage report
      - name: Generate coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### CLI TypeScript" >> $GITHUB_STEP_SUMMARY
          cat cli/coverage/lcov.info | grep -A 3 "end_of_record" | tail -1 || echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Python SDK" >> $GITHUB_STEP_SUMMARY
          echo "See coverage.xml for details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### JavaScript SDK" >> $GITHUB_STEP_SUMMARY
          cat sdk/javascript/coverage/lcov.info | grep -A 3 "end_of_record" | tail -1 || echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY

      # Coverage threshold check
      - name: Check coverage thresholds
        working-directory: ./cli
        run: |
          # Extract coverage percentage from Jest output
          # This is a placeholder - adjust based on actual Jest output format
          echo "Checking coverage thresholds (target: >90%)"
          # Will fail if coverage is below threshold set in jest.config.js
