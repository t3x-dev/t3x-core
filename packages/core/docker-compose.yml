# DEV-ONLY / LEGACY
#
# 仅用于“单跑 core”调试；不要作为 full-stack 入口使用。
# Full-stack 请使用仓库根目录的 `docker-compose.yml`：
#   docker compose up -d --build
#
# Core-only (this file):
#   docker compose -f t3x-core/docker-compose.yml up -d --build
#   docker compose -f t3x-core/docker-compose.yml down

services:
  t3x-core:
    build:
      context: ..
      dockerfile: t3x-cli/Dockerfile
    container_name: t3x-core
    ports:
      - "8000:8000"
    volumes:
      - t3x-data:/app/.t3x
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - T3X_ROOT=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  t3x-data:
    driver: local
