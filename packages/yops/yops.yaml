# ============================================================================
# YOps — Declarative YAML Operations Specification
# ============================================================================
#
# This file IS the YOps specification. It is declarative, machine-readable,
# and self-describing. Any YAML parser can read it. Any language can
# implement an engine from it.
#
# TypeScript, Python, Rust, Go implementations derive from this file.
# The TypeScript reference implementation lives in this package (@t3x-dev/yops).
# ============================================================================

name: yops
version: "1.0"
description: Declarative YAML-to-YAML operations

# ----------------------------------------------------------------------------
# Value — what YOps operates on
# ----------------------------------------------------------------------------
value:
  type: any
  description: >
    Any valid YAML value. A YOps document is any YValue — scalar, sequence,
    or mapping. Operations address locations within the document via paths.
  variants:
    - string
    - number
    - boolean
    - "null"
    - sequence    # ordered list of YValues
    - mapping     # key-value pairs where keys are strings

# ----------------------------------------------------------------------------
# Path — how YOps addresses locations in a document
# ----------------------------------------------------------------------------
path:
  separator: "/"
  description: >
    Slash-separated address into a YAML document. Supports three segment types
    that can be freely combined in a single path.
  segments:
    key:
      syntax: "name"
      description: Mapping key lookup
      example: config/database/host
    index:
      syntax: "[n]"
      description: Sequence index (0-based)
      example: items/[0]/name
    match:
      syntax: "[key=value]"
      description: >
        Find first item in a sequence where item.key equals value.
        Type coercion: [id=1] matches both "1" and 1.
      example: users/[name=alice]/role
    quoted_key:
      syntax: '"name"'
      description: >
        Mapping key wrapped in double quotes. Used when a key contains a
        reserved character (`/`, `[`, `]`, `=`) or whitespace. Inside the
        quotes, every character is a literal except for two escapes:
        `\"` is a literal double quote, `\\` is a literal backslash.
        Reserved characters never need escaping inside a quoted segment.
      example: config/"db/prod"/host
  escape:
    rule: >
      A path segment that begins with `"` is read as a quoted key. The
      quoted segment ends at the first unescaped `"`. Inside the quotes,
      `\"` decodes to `"` and `\\` decodes to `\`. Any other backslash
      sequence is a parse error (`YOPS_PATH_INVALID_ESCAPE`). A quote
      that opens but never closes is `YOPS_PATH_UNCLOSED_QUOTE`. Outside
      a quoted segment, the existing key / index / match rules are
      unchanged.
    examples:
      - description: key contains a slash
        path: config/"db/prod"/host
        decodes_to_key: db/prod
      - description: key contains a literal double quote
        path: '"some \"weird\" key"'
        decodes_to_key: 'some "weird" key'
      - description: key contains a literal backslash
        path: '"path\\with\\backslashes"'
        decodes_to_key: 'path\with\backslashes'
    match_value_note: >
      Match values inside `[key=value]` are read literally up to the
      closing `]` and are NOT quoted. Wrapping the value in double quotes
      (e.g. `[email="alice@x.com"]`) makes the parsed value include the
      literal quote characters and will fail to match a normal field.
      Reserved-character keys are addressed via quoted key segments,
      not via match-value quoting.
    yaml_double_escape_note: >
      YAML and YOps both use double quotes. To avoid two escape layers,
      prefer single-quoted YAML strings or block scalars when a path
      contains literal double quotes. The validator may emit an
      advisory `YOPS_PATH_LIKELY_DOUBLE_ESCAPED` (info, not error) when
      it sees patterns that suggest accidental double-escape — but it
      cannot reliably distinguish intent from accident without raw
      YAML source positions, so the warning is heuristic only.
    yaml_examples:
      - description: preferred — YAML single quotes pass YOps double quotes through verbatim
        yaml: |
          - set: { path: 'config/"db/prod"/host', value: x }
      - description: also valid — two escape layers (YAML and YOps both quoting)
        yaml: |
          - set: { path: "config/\"db/prod\"/host", value: x }
      - description: useful for paths with many quotes — YAML block scalar
        yaml: |
          - set:
              path: |-
                config/"db/prod"/host
              value: x

# ----------------------------------------------------------------------------
# Existence and type preconditions — how strict is each op?
# ----------------------------------------------------------------------------
#
# YOps doesn't have one global "strictness" rule. Each op declares its own
# preconditions in its `rules:` and `errors:` blocks. Three high-level
# patterns recur — read this before scanning the catalog so the asymmetry
# below doesn't surprise re-implementers:
#
#   - `define` is strict creation of one mapping key. The parent path must
#     already exist as a mapping; the final key must be absent. There is
#     no mkdir-p, and a non-mapping intermediate is never silently
#     replaced. Multi-segment paths require defining each ancestor first.
#
#   - `set` creates missing mapping ancestors along the path on its way
#     to the target ("lazy create"), but refuses to traverse through a
#     scalar/null intermediate — that returns INVALID_PATH. So `set`
#     is forgiving of *missing* parents, strict about *typed* ones.
#
#   - All other ops state their own existence/type preconditions in their
#     `rules:` / `errors:` blocks. `populate` requires the target to
#     exist and be a mapping; `append` requires it to exist and be a
#     sequence; `nest`/`merge` require sibling keys to exist; etc.
#     None of them auto-create anything — `set` is the only mkdir-p op.
#
# Cross-language implementations must preserve this asymmetry: a Python
# or Rust engine that "helpfully" mkdir-p's `define`, or refuses to
# auto-create for `set`, breaks behavioural conformance.

# ----------------------------------------------------------------------------
# path_fields — which fields on each op carry a path?
# ----------------------------------------------------------------------------
#
# Every op declares a `path_fields:` block naming the field(s) that carry
# YOps paths. Three roles:
#
#   - primary       — the single path the op operates on (most ops).
#   - source        — for two-path ops (`move`, `clone`): where data is
#                     read from. The source path must exist at apply time.
#   - destination   — for two-path ops: where data is written. The
#                     destination must NOT exist at apply time.
#
# Tools that walk an op list to reason about which paths exist (e.g. the
# extractor compiler's ancestor-define injector) read this metadata
# instead of pattern-matching every op shape. A 19th op added later only
# needs to declare its `path_fields` for the existing tooling to handle
# it correctly.

# ----------------------------------------------------------------------------
# Operations — 18 atomic YAML operations in 4 categories
# ----------------------------------------------------------------------------
operations:

  # ═══════════════════════════════════════════════════════════════════════════
  # DDL — Data Definition (structure)
  # ═══════════════════════════════════════════════════════════════════════════

  define:
    category: ddl
    path_fields:
      primary: path
    description: Create an empty mapping at a path
    fields:
      path:
        type: string
        required: true
        description: >
          Path to create. Parent must exist and be a mapping.
          Creates the final segment as an empty mapping {}.
    rules:
      - parent path must exist and be a mapping
      - final key must not already exist
    errors:
      PATH_NOT_FOUND: parent path does not exist
      ALREADY_EXISTS: key already exists at path
      NOT_A_MAPPING: parent is not a mapping
      INVALID_PATH: path uses non-key segments (index or match) which define rejects
    example:
      - define:
          path: config/database
    tests:
      - name: creates empty mapping at root
        input: {}
        ops: [{ define: { path: config } }]
        output: { config: {} }
      - name: creates nested mapping when parent exists
        input: { config: {} }
        ops: [{ define: { path: config/database } }]
        output: { config: { database: {} } }
      - name: errors if path already exists
        input: { config: { database: {} } }
        ops: [{ define: { path: config/database } }]
        error: ALREADY_EXISTS
      - name: errors if parent does not exist
        input: {}
        ops: [{ define: { path: config/database } }]
        error: PATH_NOT_FOUND
      - name: errors if parent is not a mapping
        input: { config: 'scalar' }
        ops: [{ define: { path: config/database } }]
        error: NOT_A_MAPPING
      - name: errors if path uses an index segment
        input: { items: [] }
        ops: [{ define: { path: 'items/[0]' } }]
        error: INVALID_PATH

  drop:
    category: ddl
    path_fields:
      primary: path
    description: Remove a key and its entire subtree from a mapping
    fields:
      path:
        type: string
        required: true
        description: Path to the key to remove. Must exist.
    rules:
      - path must exist
      - removes the key and all nested values
    errors:
      PATH_NOT_FOUND: path does not exist
    example:
      - drop:
          path: config/legacy_settings
    tests:
      - name: removes a key and its subtree
        input: { config: { host: x }, other: 1 }
        ops: [{ drop: { path: config } }]
        output: { other: 1 }
      - name: errors if path does not exist
        input: {}
        ops: [{ drop: { path: missing } }]
        error: PATH_NOT_FOUND

  rename:
    category: ddl
    path_fields:
      primary: path
    description: Change a key name without moving its value
    fields:
      path:
        type: string
        required: true
        description: Path to the key to rename
      to:
        type: string
        required: true
        description: New key name
    rules:
      - path must exist
      - new key must not already exist among siblings
      - value and all children are preserved
    errors:
      PATH_NOT_FOUND: path does not exist
      ALREADY_EXISTS: target key already exists
      INVALID_PATH: path ends with a non-key segment (index or match) which rename rejects
    example:
      - rename:
          path: config/db
          to: database
    tests:
      - name: changes a key name
        input: { config: { old_name: value } }
        ops: [{ rename: { path: config/old_name, to: new_name } }]
        output: { config: { new_name: value } }
      - name: errors if target already exists
        input: { a: 1, b: 2 }
        ops: [{ rename: { path: a, to: b } }]
        error: ALREADY_EXISTS
      - name: errors if path does not exist
        input: {}
        ops: [{ rename: { path: missing, to: found } }]
        error: PATH_NOT_FOUND
      - name: errors if path ends with a non-key segment
        input: { items: [1, 2] }
        ops: [{ rename: { path: 'items/[0]', to: x } }]
        error: INVALID_PATH

  # ═══════════════════════════════════════════════════════════════════════════
  # DML — Data Manipulation (values)
  # ═══════════════════════════════════════════════════════════════════════════

  set:
    category: dml
    path_fields:
      primary: path
    description: Set a value at a path, creating intermediate mappings as needed
    fields:
      path:
        type: string
        required: true
        description: Target path (e.g., config/database/host)
      value:
        type: any
        required: true
        description: Value to set (any YValue)
    rules:
      - creates intermediate mapping keys if they don't exist
      - overwrites existing value at the final path segment
    errors:
      INVALID_PATH: cannot traverse path (e.g., intermediate is a scalar)
    example:
      - set:
          path: config/database/host
          value: localhost
    tests:
      - name: sets a value at a path
        input: { config: {} }
        ops: [{ set: { path: config/host, value: localhost } }]
        output: { config: { host: localhost } }
      - name: creates intermediate mappings
        input: {}
        ops: [{ set: { path: a/b/c, value: 1 } }]
        output: { a: { b: { c: 1 } } }
      - name: errors when an intermediate is a scalar
        input: { config: 'scalar' }
        ops: [{ set: { path: config/host, value: localhost } }]
        error: INVALID_PATH

  unset:
    category: dml
    path_fields:
      primary: path
    description: Remove a key from a mapping
    fields:
      path:
        type: string
        required: true
        description: Path to the key to remove
    rules:
      - idempotent — no error if key is already absent
      - parent must be a mapping
      - final path segment must be a mapping key (not sequence index or match selector)
    errors:
      NOT_A_MAPPING: parent is not a mapping
    example:
      - unset:
          path: config/database/password
    tests:
      - name: removes a key
        input: { a: 1, b: 2 }
        ops: [{ unset: { path: b } }]
        output: { a: 1 }
      - name: no error on missing key
        input: { a: 1 }
        ops: [{ unset: { path: missing } }]
        output: { a: 1 }
      - name: errors on sequence index path
        input: { items: [a, b, c] }
        ops:
          - unset:
              path: "items/[1]"
        error: NOT_A_MAPPING

  populate:
    category: dml
    path_fields:
      primary: path
    description: Set multiple keys on a mapping at once
    fields:
      path:
        type: string
        required: true
        description: Path to the target mapping
      values:
        type: mapping
        required: true
        description: "Key-value pairs to set: {key: value, ...}"
    rules:
      - target must exist and be a mapping
      - each key in values is set on the mapping (overwrites if exists)
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_MAPPING: target is not a mapping
      INVALID_PATH: a value-key collides with an existing scalar/null intermediate, blocking populate
    example:
      - populate:
          path: config/database
          values:
            host: localhost
            port: 5432
            name: mydb
    tests:
      - name: sets multiple keys on a mapping
        input: { config: {} }
        ops: [{ populate: { path: config, values: { host: localhost, port: 5432 } } }]
        output: { config: { host: localhost, port: 5432 } }
      - name: errors if path does not exist
        input: {}
        ops: [{ populate: { path: missing, values: { a: 1 } } }]
        error: PATH_NOT_FOUND
      - name: errors if path is not a mapping
        input: { items: [1, 2] }
        ops: [{ populate: { path: items, values: { a: 1 } } }]
        error: NOT_A_MAPPING
      - name: errors when a value-key collides with a scalar intermediate
        input: { config: { db: 'scalar' } }
        ops: [{ populate: { path: config, values: { db/host: x } } }]
        error: INVALID_PATH

  append:
    category: dml
    path_fields:
      primary: path
    description: Add a value to the end of a sequence
    fields:
      path:
        type: string
        required: true
        description: Path to the target sequence
      value:
        type: any
        required: true
        description: Value to append
    rules:
      - target must exist and be a sequence
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_SEQUENCE: target is not a sequence
    example:
      - append:
          path: config/allowed_hosts
          value: "*.example.com"
    tests:
      - name: appends to a sequence
        input: { tags: [a, b] }
        ops: [{ append: { path: tags, value: c } }]
        output: { tags: [a, b, c] }
      - name: errors if not a sequence
        input: { config: {} }
        ops: [{ append: { path: config, value: x } }]
        error: NOT_A_SEQUENCE
      - name: errors if path does not exist
        input: {}
        ops: [{ append: { path: missing, value: x } }]
        error: PATH_NOT_FOUND

  # ═══════════════════════════════════════════════════════════════════════════
  # DTL — Data Transformation (restructure)
  # ═══════════════════════════════════════════════════════════════════════════

  move:
    category: dtl
    path_fields:
      source: from
      destination: to
    description: Relocate a subtree from one path to another
    fields:
      from:
        type: string
        required: true
        description: Source path
      to:
        type: string
        required: true
        description: Destination path
    rules:
      - source must exist
      - destination must not exist
      - removes from source, creates at destination
      - cannot move into own subtree
    errors:
      PATH_NOT_FOUND: source path does not exist
      ALREADY_EXISTS: destination path already exists
      INVALID_PATH: destination cannot be inside the source subtree
    example:
      - move:
          from: config/old_db
          to: config/database
    tests:
      - name: moves a subtree
        input: { old: { data: 1 } }
        ops: [{ move: { from: old, to: new } }]
        output: { new: { data: 1 } }
      - name: errors if source missing
        input: {}
        ops: [{ move: { from: missing, to: new } }]
        error: PATH_NOT_FOUND
      - name: errors when moving into own subtree
        input: { a: { child: { value: 1 } } }
        ops: [{ move: { from: a, to: a/child/copied } }]
        error: INVALID_PATH
      - name: errors when destination already exists
        input: { a: 1, b: 2 }
        ops: [{ move: { from: a, to: b } }]
        error: ALREADY_EXISTS

  clone:
    category: dtl
    path_fields:
      source: from
      destination: to
    description: Deep copy a subtree to a new path
    fields:
      from:
        type: string
        required: true
        description: Source path to copy
      to:
        type: string
        required: true
        description: Destination path for the copy
    rules:
      - source must exist
      - destination must not exist
      - deep copy — independent of original
    errors:
      PATH_NOT_FOUND: source path does not exist
      ALREADY_EXISTS: destination path already exists
    example:
      - clone:
          from: config/production
          to: config/staging
    tests:
      - name: deep copies a subtree
        input: { defaults: { timeout: 30 } }
        ops: [{ clone: { from: defaults, to: production } }]
        output: { defaults: { timeout: 30 }, production: { timeout: 30 } }
      - name: errors if target exists
        input: { a: 1, b: 2 }
        ops: [{ clone: { from: a, to: b } }]
        error: ALREADY_EXISTS
      - name: errors if source does not exist
        input: {}
        ops: [{ clone: { from: missing, to: copy } }]
        error: PATH_NOT_FOUND

  nest:
    category: dtl
    path_fields:
      primary: path
    description: Group sibling keys under a new parent mapping
    fields:
      path:
        type: string
        required: true
        description: Path to the parent mapping containing the siblings
      keys:
        type: sequence
        item_type: string
        required: true
        description: Keys to group (must be siblings in the parent)
      under:
        type: string
        required: true
        description: New key name for the wrapper mapping
    rules:
      - all keys must exist in the parent mapping
      - wrapper key must not already exist
      - listed keys are moved under the new wrapper
    errors:
      PATH_NOT_FOUND: parent path does not exist
      NOT_A_MAPPING: parent is not a mapping
      NOT_SIBLINGS: one or more keys not found in parent
      ALREADY_EXISTS: wrapper key already exists
    example:
      - nest:
          path: config
          keys: [host, port, name]
          under: database
    tests:
      - name: wraps sibling keys
        input: { config: { host: x, port: 5432, debug: true } }
        ops: [{ nest: { path: config, keys: [host, port], under: database } }]
        output: { config: { database: { host: x, port: 5432 }, debug: true } }
      - name: errors when a listed key is not a sibling
        input: { config: { host: x } }
        ops: [{ nest: { path: config, keys: [host, port], under: database } }]
        error: NOT_SIBLINGS
      - name: errors when path does not exist
        input: {}
        ops: [{ nest: { path: missing, keys: [a], under: w } }]
        error: PATH_NOT_FOUND
      - name: errors when path is not a mapping
        input: { items: [1, 2] }
        ops: [{ nest: { path: items, keys: ['0'], under: w } }]
        error: NOT_A_MAPPING
      - name: errors when wrapper key already exists
        input: { config: { host: x, port: 5432, database: {} } }
        ops: [{ nest: { path: config, keys: [host, port], under: database } }]
        error: ALREADY_EXISTS

  split:
    category: dtl
    path_fields:
      primary: path
    description: Distribute a mapping's keys into new child mappings
    fields:
      path:
        type: string
        required: true
        description: Path to the mapping to split
      into:
        type: mapping
        required: true
        description: "{new_child_key: [key_names]} — which keys go into which child"
    rules:
      - path must exist and be a mapping
      - all referenced keys must exist in the mapping
      - a key cannot appear in multiple children
      - unlisted keys stay on the original mapping
    errors:
      PATH_NOT_FOUND: path does not exist (or a referenced source key is missing)
      NOT_A_MAPPING: target is not a mapping
      ALREADY_EXISTS: a target group name collides with a key that wasn't moved into a group
      INVALID_OP: a source key cannot be assigned to multiple split groups
    example:
      - split:
          path: config
          into:
            database: [host, port, name]
            cache: [redis_url, ttl]
    tests:
      - name: distributes keys into groups
        input: { config: { host: x, port: 5432, level: debug } }
        ops: [{ split: { path: config, into: { db: [host, port], log: [level] } } }]
        output: { config: { db: { host: x, port: 5432 }, log: { level: debug } } }
      - name: errors on duplicate source-key assignment
        input: { config: { host: x, port: 5432 } }
        ops: [{ split: { path: config, into: { db: [host], dup: [host] } } }]
        error: INVALID_OP
      - name: errors when group name collides with an unmoved key
        input: { config: { a: 1, b: 2, group: 3 } }
        ops: [{ split: { path: config, into: { group: [a] } } }]
        error: ALREADY_EXISTS
      - name: errors when path does not exist
        input: {}
        ops: [{ split: { path: missing, into: { g: [a] } } }]
        error: PATH_NOT_FOUND
      - name: errors when path is not a mapping
        input: { items: [1, 2] }
        ops: [{ split: { path: items, into: { g: ['0'] } } }]
        error: NOT_A_MAPPING

  fold:
    category: dtl
    path_fields:
      primary: path
    description: >
      Collapse a single-child mapping by promoting its only child.
      The wrapper key is removed and the child takes its place.
    fields:
      path:
        type: string
        required: true
        description: Path to the wrapper mapping (must have exactly one child key)
    rules:
      - path must exist and be a mapping
      - must have exactly one key
      - the single child replaces the wrapper
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_FOLDABLE: mapping has zero or more than one key
    example:
      - fold:
          path: config/wrapper
    tests:
      - name: collapses single-child mapping
        input: { config: { wrapper: { actual: { data: 1 } } } }
        ops: [{ fold: { path: config/wrapper } }]
        output: { config: { actual: { data: 1 } } }
      - name: errors if multiple keys
        input: { wrapper: { a: 1, b: 2 } }
        ops: [{ fold: { path: wrapper } }]
        error: NOT_FOLDABLE
      - name: errors if path does not exist
        input: {}
        ops: [{ fold: { path: missing } }]
        error: PATH_NOT_FOUND

  merge:
    category: dtl
    path_fields:
      primary: path
    description: Combine sibling keys into one mapping
    fields:
      path:
        type: string
        required: true
        description: Path to the parent mapping
      keys:
        type: sequence
        item_type: string
        required: true
        description: Sibling keys to combine
      into:
        type: string
        required: true
        description: Key name for the merged result
    rules:
      - all keys must exist as siblings in the parent
      - values are combined (last wins on key conflict)
      - original keys are removed, merged key takes their place
    errors:
      PATH_NOT_FOUND: parent path does not exist
      NOT_A_MAPPING: parent is not a mapping
      NOT_SIBLINGS: one or more keys not found
    example:
      - merge:
          path: config
          keys: [db_primary, db_replica]
          into: database
    tests:
      - name: combines sibling mappings
        input: { config: { a: { x: 1 }, b: { y: 2 } } }
        ops: [{ merge: { path: config, keys: [a, b], into: merged } }]
        output: { config: { merged: { x: 1, y: 2 } } }
      - name: errors when a listed key is not a sibling
        input: { config: { a: { x: 1 } } }
        ops: [{ merge: { path: config, keys: [a, b], into: merged } }]
        error: NOT_SIBLINGS
      - name: errors when path does not exist
        input: {}
        ops: [{ merge: { path: missing, keys: [a], into: m } }]
        error: PATH_NOT_FOUND
      - name: errors when path is not a mapping
        input: { items: [1, 2] }
        ops: [{ merge: { path: items, keys: ['0', '1'], into: m } }]
        error: NOT_A_MAPPING

  sort:
    category: dtl
    path_fields:
      primary: path
    description: Sort a sequence in place
    fields:
      path:
        type: string
        required: true
        description: Path to the sequence to sort
      by:
        type: string
        required: false
        description: >
          Key to sort by (for sequences of mappings).
          Omit for sequences of scalars.
      order:
        type: string
        required: false
        default: asc
        enum: [asc, desc]
        description: Sort direction
    rules:
      - target must exist and be a sequence
      - if 'by' is provided, items must be mappings with that key
      - >
        comparison is deterministic and language-portable: type rank
        null < boolean < number < string < array < mapping; within a type,
        strings compare by Unicode codepoint (NOT UTF-16 code unit, NOT
        locale collation — implementations must iterate codepoints, not
        UTF-16 chars, otherwise non-BMP characters sort differently from
        the spec), numbers by numeric value, arrays/mappings by their
        canonical encoding (mapping keys sorted by Unicode codepoint
        before comparison).
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_SEQUENCE: target is not a sequence
      INVALID_OP: sort by requires every item to be a mapping containing the requested key
    example:
      - sort:
          path: users
          by: name
          order: asc
    tests:
      - name: sorts sequence ascending
        input: { items: [cherry, apple, banana] }
        ops: [{ sort: { path: items } }]
        output: { items: [apple, banana, cherry] }
      - name: sorts by Unicode codepoint, not locale
        # 'B' (U+0042) < 'a' (U+0061) in codepoint order, but locale order
        # often interleaves them. Result must be codepoint-ordered.
        input: { items: ['a', 'B', 'c'] }
        ops: [{ sort: { path: items } }]
        output: { items: ['B', 'a', 'c'] }
      - name: errors when sort by sees non-mapping item
        input: { users: [{ name: alice }, bob] }
        ops: [{ sort: { path: users, by: name } }]
        error: INVALID_OP
      - name: errors when sort by key is missing
        input: { users: [{ name: alice }, { age: 30 }] }
        ops: [{ sort: { path: users, by: name } }]
        error: INVALID_OP
      - name: errors when path does not exist
        input: {}
        ops: [{ sort: { path: missing } }]
        error: PATH_NOT_FOUND
      - name: errors when path is not a sequence
        input: { config: { host: x } }
        ops: [{ sort: { path: config } }]
        error: NOT_A_SEQUENCE

  unique:
    category: dtl
    path_fields:
      primary: path
    description: Deduplicate a sequence, keeping first occurrence
    fields:
      path:
        type: string
        required: true
        description: Path to the sequence to deduplicate
      by:
        type: string
        required: false
        description: >
          Key to deduplicate by (for sequences of mappings).
          Omit for sequences of scalars.
    rules:
      - target must exist and be a sequence
      - if 'by' is provided, items must be mappings with that key
      - keeps first occurrence, removes subsequent duplicates
      - >
        equality is by canonical encoding: scalars by value; arrays element-wise;
        mappings with keys sorted by Unicode codepoint (NOT UTF-16 code
        unit) before comparison. This is language-portable and independent
        of YAML key insertion order or runtime string representation.
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_SEQUENCE: target is not a sequence
      INVALID_OP: unique by requires every item to be a mapping containing the requested key
    example:
      - unique:
          path: tags
    tests:
      - name: deduplicates sequence
        input: { tags: [a, b, a, c, b] }
        ops: [{ unique: { path: tags } }]
        output: { tags: [a, b, c] }
      - name: deduplicates mappings irrespective of key order
        # The two mappings are equal under canonical encoding even though
        # their keys are written in different orders.
        input: { items: [{ a: 1, b: 2 }, { b: 2, a: 1 }] }
        ops: [{ unique: { path: items } }]
        output: { items: [{ a: 1, b: 2 }] }
      - name: errors when unique by sees non-mapping item
        input: { users: [{ name: alice }, bob] }
        ops: [{ unique: { path: users, by: name } }]
        error: INVALID_OP
      - name: errors when unique by key is missing
        input: { users: [{ name: alice }, { age: 30 }] }
        ops: [{ unique: { path: users, by: name } }]
        error: INVALID_OP
      - name: errors when path does not exist
        input: {}
        ops: [{ unique: { path: missing } }]
        error: PATH_NOT_FOUND
      - name: errors when path is not a sequence
        input: { config: { host: x } }
        ops: [{ unique: { path: config } }]
        error: NOT_A_SEQUENCE

  pick:
    category: dtl
    path_fields:
      primary: path
    description: Keep only specified keys in a mapping, remove the rest
    fields:
      path:
        type: string
        required: true
        description: Path to the mapping to filter
      keys:
        type: sequence
        item_type: string
        required: true
        description: Keys to keep
    rules:
      - target must exist and be a mapping
      - keys not in the list are removed
      - keys in the list that don't exist are ignored
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_MAPPING: target is not a mapping
    example:
      - pick:
          path: user
          keys: [name, email]
    tests:
      - name: keeps only listed keys
        input: { config: { host: x, port: 5432, secret: abc } }
        ops: [{ pick: { path: config, keys: [host, port] } }]
        output: { config: { host: x, port: 5432 } }
      - name: errors if path does not exist
        input: {}
        ops: [{ pick: { path: missing, keys: [a] } }]
        error: PATH_NOT_FOUND
      - name: errors if path is not a mapping
        input: { items: [1, 2] }
        ops: [{ pick: { path: items, keys: ['0'] } }]
        error: NOT_A_MAPPING

  omit:
    category: dtl
    path_fields:
      primary: path
    description: Remove specified keys from a mapping, keep the rest
    fields:
      path:
        type: string
        required: true
        description: Path to the mapping to filter
      keys:
        type: sequence
        item_type: string
        required: true
        description: Keys to remove
    rules:
      - target must exist and be a mapping
      - keys in the list are removed
      - keys not found are ignored (idempotent)
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_MAPPING: target is not a mapping
    example:
      - omit:
          path: user
          keys: [password, internal_id]
    tests:
      - name: removes listed keys
        input: { config: { host: x, secret: abc } }
        ops: [{ omit: { path: config, keys: [secret, missing] } }]
        output: { config: { host: x } }
      - name: errors if path does not exist
        input: {}
        ops: [{ omit: { path: missing, keys: [a] } }]
        error: PATH_NOT_FOUND
      - name: errors if path is not a mapping
        input: { items: [1, 2] }
        ops: [{ omit: { path: items, keys: ['0'] } }]
        error: NOT_A_MAPPING

  # ═══════════════════════════════════════════════════════════════════════════
  # DCL — Data Control (assertions)
  # ═══════════════════════════════════════════════════════════════════════════

  assert:
    category: dcl
    path_fields:
      primary: path
    description: >
      Validate a condition against the document. Read-only — never mutates.
      Fail-fast: if the assertion fails, execution stops.
    fields:
      path:
        type: string
        required: true
        description: Path to check
      equals:
        type: any
        required: false
        description: Expected value (deep equality check)
      exists:
        type: boolean
        required: false
        description: "true: path must exist. false: path must NOT exist."
      type:
        type: string
        required: false
        enum: [mapping, sequence, scalar]
        description: Expected type of the value at path
    rules:
      - at least one condition (equals, exists, type) must be provided
      - all provided conditions must pass
      - does not mutate the document
      - on failure, stops execution with ASSERTION_FAILED
    errors:
      ASSERTION_FAILED: condition not met (message includes details)
    example:
      - assert:
          path: config/database/host
          exists: true
          type: scalar
    tests:
      - name: passes when value equals expected
        input: { version: 2 }
        ops: [{ assert: { path: version, equals: 2 } }]
        output: { version: 2 }
      - name: fails when value differs
        input: { version: 1 }
        ops: [{ assert: { path: version, equals: 2 } }]
        error: ASSERTION_FAILED
      - name: passes exists check
        input: { config: {} }
        ops: [{ assert: { path: config, exists: true } }]
        output: { config: {} }
      - name: rejects assert with no condition
        input: { config: {} }
        ops: [{ assert: { path: config } }]
        error: INVALID_OP

# ----------------------------------------------------------------------------
# Error Codes
# ----------------------------------------------------------------------------
errors:
  PATH_NOT_FOUND:
    description: The specified path does not exist in the document
  ALREADY_EXISTS:
    description: A key or path already exists where a new one is expected
  NOT_A_MAPPING:
    description: Expected a mapping (object) but found a different type
  NOT_A_SEQUENCE:
    description: Expected a sequence (array) but found a different type
  NOT_SIBLINGS:
    description: Referenced keys are not siblings in the same mapping
  NOT_FOLDABLE:
    description: Mapping cannot be folded (has zero or more than one key)
  INVALID_PATH:
    description: Path could not be traversed (intermediate is wrong type)
  ASSERTION_FAILED:
    description: An assert condition was not met
  UNKNOWN_OP:
    description: Operation name not recognized
  INVALID_OP:
    description: >
      Operation shape or runtime contract violated (e.g. malformed payload,
      enum field outside the allowed set, split groups claiming the same
      source key). Distinct from UNKNOWN_OP, which means the op key
      itself wasn't recognised.

# ----------------------------------------------------------------------------
# Execution
# ----------------------------------------------------------------------------
execution:
  order: sequential          # operations execute top to bottom
  on_error: stop             # stop at first failed operation
  immutable_input: true      # engine deep clones input, never mutates original
  idempotent_ops: [unset, omit]  # no error on missing target
  strict_ops:
    - define
    - drop
    - rename
    - set
    - populate
    - append
    - move
    - clone
    - nest
    - split
    - fold
    - merge
    - sort
    - unique
    - pick
  readonly_ops: [assert]     # never mutates the document

# ----------------------------------------------------------------------------
# Document Format
# ----------------------------------------------------------------------------
document:
  root_key: yops
  type: sequence of operations
  description: >
    A YOps document is a YAML file with a single root key "yops"
    containing a sequence of operations. Each operation is a mapping
    with exactly one key (the operation name) whose value contains
    the operation's fields.
  example:
    yops:
      - define:
          path: config/database
      - populate:
          path: config/database
          values:
            host: localhost
            port: 5432
      - set:
          path: config/database/pool_size
          value: 10
      - assert:
          path: config/database/host
          exists: true

# ============================================================================
# Decision Guide — which op to use
# ============================================================================
#
# Engineers often face "which op do I pick?" when several seem similar.
# This section resolves those ambiguities.

guide:

  # ── Create vs Set ──────────────────────────────────────────────────────────
  create_or_set:
    question: "I want to add something to the document"
    decision:
      - use: define
        when: "You need an empty mapping as a container (like mkdir)"
        note: "Errors if path exists — use for strict creation"
      - use: set
        when: "You know the exact value to place at a path"
        note: "Creates intermediates, overwrites existing — use for upsert"
      - use: populate
        when: "You have multiple key-value pairs to add to an existing mapping"
        note: "Target mapping must exist — combine with define for new mappings"
      - use: append
        when: "You are adding an item to the end of a sequence"
        note: "Target must be an existing sequence"

  # ── Remove ops ─────────────────────────────────────────────────────────────
  remove:
    question: "I want to remove something from the document"
    decision:
      - use: drop
        when: "The path MUST exist — removal is the intent, missing is a bug"
        note: "Strict — errors on PATH_NOT_FOUND"
      - use: unset
        when: "Remove if present, ignore if absent — cleanup / idempotent"
        note: "Idempotent — never errors on missing key"
      - use: omit
        when: "You want to remove specific keys from a mapping by name"
        note: "Idempotent — ignores missing keys"
      - use: pick
        when: "You want to KEEP specific keys and remove everything else"
        note: "Inverse of omit — unlisted keys are removed"

  # ── Restructure ops ────────────────────────────────────────────────────────
  restructure:
    question: "I want to reorganize the document shape"
    decision:
      - use: rename
        when: "Change a key name without moving its value"
        note: "Stays at the same level, preserves key order"
      - use: move
        when: "Relocate a subtree to a different path (changes level)"
        note: "Source is removed, destination is created"
      - use: clone
        when: "Copy a subtree — original stays, copy is independent"
        note: "Deep copy — mutations to clone do not affect source"
      - use: nest
        when: "Group sibling keys under a new parent (flatten to nested)"
        note: "Keys move DOWN one level: {a, b} becomes {wrapper: {a, b}}"
      - use: fold
        when: "Collapse a single-child wrapper (nested to flatten)"
        note: "Child moves UP one level: {wrapper: {child}} becomes {child}"
      - use: split
        when: "Distribute keys into multiple named groups"
        note: "Like nest but for multiple groups at once"
      - use: merge
        when: "Combine sibling mappings into one (reverse of split)"
        note: "Last wins on key conflicts"

  # ── Sequence ops ───────────────────────────────────────────────────────────
  sequence:
    question: "I want to work with arrays/sequences"
    decision:
      - use: append
        when: Add an item to the end
      - use: sort
        when: Reorder items (by value or by a key in mapping items)
      - use: unique
        when: Deduplicate (by value or by a key in mapping items)
      - use: drop
        when: Remove a specific item by index or key match
        example: "drop: { path: items/[0] } or drop: { path: users/[name=alice] }"

# ============================================================================
# Type Contracts — what each op expects and produces
# ============================================================================
#
# Every op has a type contract: what shape it expects at the target path,
# and what shape it leaves behind. This table is the quick reference.

contracts:

  # Format: op → expects (at target path) → produces (at target path)

  # DDL
  define:    { expects: "parent is mapping, final key absent", produces: "empty mapping {}" }
  drop:      { expects: "path exists (any type)", produces: "key removed" }
  rename:    { expects: "path exists, new name absent among siblings", produces: "same value, new key name" }

  # DML
  set:       { expects: "intermediates are mappings (auto-creates missing)", produces: "any value" }
  unset:     { expects: "parent is mapping (idempotent on missing key)", produces: "key removed" }
  populate:  { expects: "target is mapping", produces: "mapping with added/overwritten keys" }
  append:    { expects: "target is sequence", produces: "sequence with new item at end" }

  # DTL
  move:      { expects: "source exists, destination absent", produces: "value at new path, source removed" }
  clone:     { expects: "source exists, destination absent", produces: "independent deep copy at new path" }
  nest:      { expects: "target is mapping, listed keys exist", produces: "keys moved under new wrapper key" }
  split:     { expects: "target is mapping, listed keys exist", produces: "keys distributed into named groups" }
  fold:      { expects: "target is mapping with exactly 1 key", produces: "child replaces wrapper" }
  merge:     { expects: "target is mapping, listed keys are all mappings", produces: "combined mapping (last wins)" }
  sort:      { expects: "target is sequence", produces: "sorted sequence (stable)" }
  unique:    { expects: "target is sequence", produces: "deduplicated sequence (first wins)" }
  pick:      { expects: "target is mapping", produces: "mapping with only listed keys" }
  omit:      { expects: "target is mapping", produces: "mapping without listed keys" }

  # DCL
  assert:    { expects: "any (read-only)", produces: "document unchanged — fails on unmet condition" }

# ============================================================================
# Composition Recipes — common multi-op patterns
# ============================================================================
#
# Single ops are atoms. Real work is pipelines. These recipes show how
# ops compose to accomplish common tasks.

recipes:

  create_and_populate:
    description: Create a new section with initial values
    ops:
      - define:
          path: config/database
      - populate:
          path: config/database
          values: { host: localhost, port: 5432, name: mydb }
    before: {}
    after: { config: { database: { host: localhost, port: 5432, name: mydb } } }

  clone_and_customize:
    description: Create a variant from a template
    ops:
      - clone:
          from: environments/production
          to: environments/staging
      - set:
          path: environments/staging/host
          value: staging.db.internal
      - set:
          path: environments/staging/debug
          value: true
    before: { environments: { production: { host: prod.db.internal, port: 5432, debug: false } } }
    after:
      environments:
        production: { host: prod.db.internal, port: 5432, debug: false }
        staging: { host: staging.db.internal, port: 5432, debug: true }

  flatten_to_nested:
    description: Group flat keys into a structured hierarchy
    ops:
      - nest:
          path: config
          keys: [db_host, db_port, db_name]
          under: database
      - nest:
          path: config
          keys: [cache_url, cache_ttl]
          under: cache
    before: { config: { db_host: x, db_port: 5432, db_name: mydb, cache_url: "redis://...", cache_ttl: 300, debug: true } }
    after:
      config:
        database: { db_host: x, db_port: 5432, db_name: mydb }
        cache: { cache_url: "redis://...", cache_ttl: 300 }
        debug: true

  split_and_rename:
    description: Reorganize a flat mapping into named groups with clean keys
    ops:
      - split:
          path: settings
          into:
            database: [host, port]
            logging: [level, format]
      - rename:
          path: settings/logging/level
          to: severity
    before: { settings: { host: x, port: 5432, level: debug, format: json } }
    after:
      settings:
        database: { host: x, port: 5432 }
        logging: { severity: debug, format: json }

  collect_sort_dedup:
    description: Build a clean, sorted, unique list
    ops:
      - append:
          path: tags
          value: python
      - append:
          path: tags
          value: yaml
      - append:
          path: tags
          value: python
      - sort:
          path: tags
      - unique:
          path: tags
    before: { tags: [go, yaml] }
    after: { tags: [go, python, yaml] }

  guarded_mutation:
    description: Assert preconditions before mutating
    ops:
      - assert:
          path: version
          equals: 2
      - assert:
          path: config
          type: mapping
      - set:
          path: config/migrated
          value: true
      - set:
          path: version
          value: 3
    before: { version: 2, config: { host: x } }
    after: { version: 3, config: { host: x, migrated: true } }

  merge_and_fold:
    description: Combine siblings then collapse wrapper
    ops:
      - merge:
          path: root
          keys: [defaults, overrides]
          into: merged
      - fold:
          path: root
    before: { root: { defaults: { timeout: 30, retries: 3 }, overrides: { timeout: 60 } } }
    after: { merged: { timeout: 60, retries: 3 } }

  reshape_round_trip:
    description: Split into groups then merge back (demonstrates reversibility)
    ops:
      - split:
          path: config
          into: { db: [host, port], app: [debug, name] }
      - assert:
          path: config/db/host
          equals: x
      - merge:
          path: config
          keys: [db, app]
          into: flat
    before: { config: { host: x, port: 5432, debug: true, name: myapp } }
    after: { config: { flat: { host: x, port: 5432, debug: true, name: myapp } } }

# ============================================================================
# Error Reference — which ops throw which errors
# ============================================================================
#
# Quick reverse lookup: given an error code, which ops can produce it?

error_reference:

  PATH_NOT_FOUND:
    thrown_by:
      [append, clone, define, drop, fold, merge, move, nest, omit, pick, populate, rename, sort, split, unique]
    meaning: >
      The path you specified doesn't exist. For strict ops, this is a hard error.
      Use resolvePath or assert to check before operating.

  ALREADY_EXISTS:
    thrown_by: [clone, define, move, nest, rename, split]
    meaning: >
      The target key/path already exists. These ops refuse to overwrite.
      Use set (which overwrites) or drop the existing key first.

  NOT_A_MAPPING:
    thrown_by: [define, merge, nest, omit, pick, populate, split, unset]
    meaning: >
      You targeted a path (or its parent) that isn't a mapping — it's a
      scalar, sequence, or null. Check the type with `assert` before
      operating, or use `set` to reshape first.

  NOT_A_SEQUENCE:
    thrown_by: [append, sort, unique]
    meaning: >
      You targeted a path that isn't a sequence.
      Use set to create a sequence first, e.g. set path: items, value: []

  NOT_SIBLINGS:
    thrown_by: [merge, nest]
    meaning: >
      One or more keys you referenced don't exist as siblings in the parent mapping.
      Verify key names match exactly.

  NOT_FOLDABLE:
    thrown_by: [fold]
    meaning: >
      The mapping at the path has zero or more than one key. Fold requires
      exactly one child key. Use pick to reduce to one key first, or use
      a different restructuring op.

  INVALID_PATH:
    thrown_by: [define, move, populate, rename, set]
    meaning: >
      The path can't be traversed because an intermediate value is a scalar
      or null (not a mapping/sequence), or because the op only accepts key
      segments and the path includes an index/match segment. The engine
      won't silently overwrite intermediate values — reshape the document
      first.

  INVALID_OP:
    thrown_by: [engine, sort, split, unique]
    meaning: >
      The op shape doesn't satisfy a runtime contract that the YAML schema
      can't express on its own — e.g. an enum field outside the allowed
      set, or two split groups claiming the same source key. Distinct
      from UNKNOWN_OP, which means the op key wasn't recognised at all.

  ASSERTION_FAILED:
    thrown_by: [assert]
    meaning: >
      One or more conditions (equals, exists, type) did not hold.
      All provided conditions are checked — the assertion fails on the
      first unmet condition.

  UNKNOWN_OP:
    thrown_by: [engine]
    meaning: >
      The operation name wasn't recognized by the registry. Check for typos
      or verify your engine version supports the op.

# ============================================================================
# Diagnostic Codes — what the validator emits (separate from runtime errors)
# ============================================================================
#
# Engine errors (above) fire at runtime when an op fails to apply. Diagnostics
# fire BEFORE apply, when a YOps document or op list is validated for shape
# correctness. The two surfaces overlap (a malformed payload fails both
# pre-flight validation AND runtime apply), but the codes are distinct so
# UI / API consumers can treat them differently:
#
#   - Engine errors block apply by definition; they're always errors.
#   - Diagnostics carry severity (error / warning / info). An advisory
#     diagnostic does NOT block apply and is NOT a parse error — it's a
#     hint for the human or LLM authoring the document.
#
# Adding new codes is non-breaking. Removing or renaming an existing code
# is breaking and requires a major version bump on @t3x-dev/yops.

diagnostic_codes:

  # ── Document / envelope (op_index === null) ──────────────────────────────

  YOPS_INVALID_YAML:
    severity: error
    meaning: The input string failed to parse as YAML.

  YOPS_DOCUMENT_NOT_MAPPING_OR_ARRAY:
    severity: error
    meaning: >
      The top-level YAML value is a scalar. A YOps document must be either
      a bare array of ops or a mapping with a `yops:` key whose value is
      an array.

  YOPS_DOCUMENT_YOPS_NOT_ARRAY:
    severity: error
    meaning: >
      The document is a mapping with a `yops:` key, but that key's value
      isn't an array.

  # ── Op-level ──────────────────────────────────────────────────────────────

  YOPS_OP_NOT_MAPPING:
    severity: error
    meaning: An op item is null, a scalar, or an array. Ops must be mappings.

  YOPS_OP_NO_KEY:
    severity: error
    meaning: >
      An op object has no non-metadata key. Metadata keys (currently
      `source`) are skipped when picking the operation key; an op that
      has only metadata is invalid.

  YOPS_OP_UNKNOWN:
    severity: error
    meaning: >
      The op key isn't a registered op name. Distinct from
      YOPS_OP_NO_KEY (where no key is found at all).

  YOPS_OP_PAYLOAD_NOT_MAPPING:
    severity: error
    meaning: >
      The value under the op key is null, a scalar, or an array. Op
      payloads must be mappings holding the op's fields.

  YOPS_OP_FIELD_MISSING:
    severity: error
    meaning: A required field on this op is absent from the payload.

  YOPS_OP_FIELD_UNKNOWN:
    severity: error
    meaning: The payload contains a field name not declared in the spec for this op.

  YOPS_OP_FIELD_TYPE_MISMATCH:
    severity: error
    meaning: A field's runtime value type disagrees with its declared type in the spec.

  YOPS_OP_ENUM_VIOLATION:
    severity: error
    meaning: A field's value is not in the declared enum (e.g. `sort.order` outside [asc, desc]).

  YOPS_OP_REFINEMENT_VIOLATION:
    severity: error
    meaning: >
      An op-specific cross-field rule (beyond per-field type / required /
      enum) failed. Mirrors a `.refine(...)` clause from the runtime
      schema so preflight and apply-time agree on which payloads are
      well-formed. Example: `assert` requires at least one of `equals`,
      `exists`, or `type`.

  # ── Path syntax ──────────────────────────────────────────────────────────
  #
  # Path-syntax diagnostics flag inputs that the runtime parser cannot make
  # sense of, or that are almost certainly a typo against the documented
  # grammar. They do NOT impose a key-format grammar on plain key segments:
  # the runtime engine accepts any non-empty string as a plain key
  # (including hyphens, dots, and whitespace), so the validator must too.
  # Reserved characters (`/`, `[`, `]`, `=`, `"`) are addressed via the
  # quoted-segment escape, not via a SNAKE_CASE-style key restriction.

  YOPS_PATH_EMPTY:
    severity: error
    meaning: Path string is empty (zero-length input).

  YOPS_PATH_UNCLOSED_QUOTE:
    severity: error
    meaning: A quoted segment was opened with `"` but never closed.

  YOPS_PATH_INVALID_ESCAPE:
    severity: error
    meaning: >
      Inside a quoted segment, a backslash precedes a character other
      than `"` or `\`. Only `\"` and `\\` are valid escapes.

  YOPS_PATH_INVALID_INDEX_SYNTAX:
    severity: error
    meaning: A bracket segment looks like an index but isn't `[<digits>]`.

  YOPS_PATH_INVALID_MATCH_SYNTAX:
    severity: error
    meaning: A bracket segment looks like a match but isn't `[<key>=<value>]`.

  YOPS_PATH_LIKELY_DOUBLE_ESCAPED:
    severity: info
    meaning: >
      Heuristic; advisory only. The path contains `\"` patterns OUTSIDE
      any quoted segment, which often means the YAML quote layer and the
      YOps quote layer were both applied (e.g. a JSON-encoded string
      round-tripped through a YAML emitter). Inside a quoted segment,
      `\"` is the documented escape for a literal `"` and never triggers
      this advisory. The validator cannot tell intent from accident
      without raw YAML source positions, so this is never an error and
      never blocks apply. Authors should prefer single-quoted YAML
      strings or block scalars when paths contain literal double quotes
      (see `path.escape.yaml_double_escape_note`).
