# ============================================================================
# YOps — Declarative YAML Operations Specification
# ============================================================================
#
# This file IS the YOps specification. It is declarative, machine-readable,
# and self-describing. Any YAML parser can read it. Any language can
# implement an engine from it.
#
# TypeScript, Python, Rust, Go implementations derive from this file.
# The TypeScript reference implementation lives in this package (@t3x-dev/yops).
# ============================================================================

name: yops
version: "1.0"
description: Declarative YAML-to-YAML operations

# ----------------------------------------------------------------------------
# Value — what YOps operates on
# ----------------------------------------------------------------------------
value:
  type: any
  description: >
    Any valid YAML value. A YOps document is any YValue — scalar, sequence,
    or mapping. Operations address locations within the document via paths.
  variants:
    - string
    - number
    - boolean
    - "null"
    - sequence    # ordered list of YValues
    - mapping     # key-value pairs where keys are strings

# ----------------------------------------------------------------------------
# Path — how YOps addresses locations in a document
# ----------------------------------------------------------------------------
path:
  separator: "/"
  description: >
    Slash-separated address into a YAML document. Supports three segment types
    that can be freely combined in a single path.
  segments:
    key:
      syntax: "name"
      description: Mapping key lookup
      example: config/database/host
    index:
      syntax: "[n]"
      description: Sequence index (0-based)
      example: items/[0]/name
    match:
      syntax: "[key=value]"
      description: >
        Find first item in a sequence where item.key equals value.
        Type coercion: [id=1] matches both "1" and 1.
      example: users/[name=alice]/role

# ----------------------------------------------------------------------------
# Operations — 18 atomic YAML operations in 4 categories
# ----------------------------------------------------------------------------
operations:

  # ═══════════════════════════════════════════════════════════════════════════
  # DDL — Data Definition (structure)
  # ═══════════════════════════════════════════════════════════════════════════

  define:
    category: ddl
    description: Create an empty mapping at a path
    fields:
      path:
        type: string
        required: true
        description: >
          Path to create. Parent must exist and be a mapping.
          Creates the final segment as an empty mapping {}.
    rules:
      - parent path must exist and be a mapping
      - final key must not already exist
    errors:
      PATH_NOT_FOUND: parent path does not exist
      ALREADY_EXISTS: key already exists at path
      NOT_A_MAPPING: parent is not a mapping
    example:
      - define:
          path: config/database
    tests:
      - name: creates empty mapping at path
        input: {}
        ops: [{ define: { path: config/database } }]
        output: { config: { database: {} } }
      - name: errors if path already exists
        input: { config: { database: {} } }
        ops: [{ define: { path: config/database } }]
        error: ALREADY_EXISTS

  drop:
    category: ddl
    description: Remove a key and its entire subtree from a mapping
    fields:
      path:
        type: string
        required: true
        description: Path to the key to remove. Must exist.
    rules:
      - path must exist
      - removes the key and all nested values
    errors:
      PATH_NOT_FOUND: path does not exist
    example:
      - drop:
          path: config/legacy_settings
    tests:
      - name: removes a key and its subtree
        input: { config: { host: x }, other: 1 }
        ops: [{ drop: { path: config } }]
        output: { other: 1 }
      - name: errors if path does not exist
        input: {}
        ops: [{ drop: { path: missing } }]
        error: PATH_NOT_FOUND

  rename:
    category: ddl
    description: Change a key name without moving its value
    fields:
      path:
        type: string
        required: true
        description: Path to the key to rename
      to:
        type: string
        required: true
        description: New key name
    rules:
      - path must exist
      - new key must not already exist among siblings
      - value and all children are preserved
    errors:
      PATH_NOT_FOUND: path does not exist
      ALREADY_EXISTS: target key already exists
    example:
      - rename:
          path: config/db
          to: database
    tests:
      - name: changes a key name
        input: { config: { old_name: value } }
        ops: [{ rename: { path: config/old_name, to: new_name } }]
        output: { config: { new_name: value } }
      - name: errors if target already exists
        input: { a: 1, b: 2 }
        ops: [{ rename: { path: a, to: b } }]
        error: ALREADY_EXISTS

  # ═══════════════════════════════════════════════════════════════════════════
  # DML — Data Manipulation (values)
  # ═══════════════════════════════════════════════════════════════════════════

  set:
    category: dml
    description: Set a value at a path, creating intermediate mappings as needed
    fields:
      path:
        type: string
        required: true
        description: Target path (e.g., config/database/host)
      value:
        type: any
        required: true
        description: Value to set (any YValue)
    rules:
      - creates intermediate mapping keys if they don't exist
      - overwrites existing value at the final path segment
    errors:
      INVALID_PATH: cannot traverse path (e.g., intermediate is a scalar)
    example:
      - set:
          path: config/database/host
          value: localhost
    tests:
      - name: sets a value at a path
        input: { config: {} }
        ops: [{ set: { path: config/host, value: localhost } }]
        output: { config: { host: localhost } }
      - name: creates intermediate mappings
        input: {}
        ops: [{ set: { path: a/b/c, value: 1 } }]
        output: { a: { b: { c: 1 } } }

  unset:
    category: dml
    description: Remove a key from a mapping
    fields:
      path:
        type: string
        required: true
        description: Path to the key to remove
    rules:
      - idempotent — no error if key is already absent
      - parent must be a mapping
    errors:
      NOT_A_MAPPING: parent is not a mapping
    example:
      - unset:
          path: config/database/password
    tests:
      - name: removes a key
        input: { a: 1, b: 2 }
        ops: [{ unset: { path: b } }]
        output: { a: 1 }
      - name: no error on missing key
        input: { a: 1 }
        ops: [{ unset: { path: missing } }]
        output: { a: 1 }

  populate:
    category: dml
    description: Set multiple keys on a mapping at once
    fields:
      path:
        type: string
        required: true
        description: Path to the target mapping
      values:
        type: mapping
        required: true
        description: "Key-value pairs to set: {key: value, ...}"
    rules:
      - target must exist and be a mapping
      - each key in values is set on the mapping (overwrites if exists)
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_MAPPING: target is not a mapping
    example:
      - populate:
          path: config/database
          values:
            host: localhost
            port: 5432
            name: mydb
    tests:
      - name: sets multiple keys on a mapping
        input: { config: {} }
        ops: [{ populate: { path: config, values: { host: localhost, port: 5432 } } }]
        output: { config: { host: localhost, port: 5432 } }
      - name: errors if path does not exist
        input: {}
        ops: [{ populate: { path: missing, values: { a: 1 } } }]
        error: PATH_NOT_FOUND

  append:
    category: dml
    description: Add a value to the end of a sequence
    fields:
      path:
        type: string
        required: true
        description: Path to the target sequence
      value:
        type: any
        required: true
        description: Value to append
    rules:
      - target must exist and be a sequence
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_SEQUENCE: target is not a sequence
    example:
      - append:
          path: config/allowed_hosts
          value: "*.example.com"
    tests:
      - name: appends to a sequence
        input: { tags: [a, b] }
        ops: [{ append: { path: tags, value: c } }]
        output: { tags: [a, b, c] }
      - name: errors if not a sequence
        input: { config: {} }
        ops: [{ append: { path: config, value: x } }]
        error: NOT_A_SEQUENCE

  # ═══════════════════════════════════════════════════════════════════════════
  # DTL — Data Transformation (restructure)
  # ═══════════════════════════════════════════════════════════════════════════

  move:
    category: dtl
    description: Relocate a subtree from one path to another
    fields:
      from:
        type: string
        required: true
        description: Source path
      to:
        type: string
        required: true
        description: Destination path
    rules:
      - source must exist
      - destination must not exist
      - removes from source, creates at destination
      - cannot move into own subtree
    errors:
      PATH_NOT_FOUND: source path does not exist
      ALREADY_EXISTS: destination path already exists
    example:
      - move:
          from: config/old_db
          to: config/database
    tests:
      - name: moves a subtree
        input: { old: { data: 1 } }
        ops: [{ move: { from: old, to: new } }]
        output: { new: { data: 1 } }
      - name: errors if source missing
        input: {}
        ops: [{ move: { from: missing, to: new } }]
        error: PATH_NOT_FOUND

  clone:
    category: dtl
    description: Deep copy a subtree to a new path
    fields:
      from:
        type: string
        required: true
        description: Source path to copy
      to:
        type: string
        required: true
        description: Destination path for the copy
    rules:
      - source must exist
      - destination must not exist
      - deep copy — independent of original
    errors:
      PATH_NOT_FOUND: source path does not exist
      ALREADY_EXISTS: destination path already exists
    example:
      - clone:
          from: config/production
          to: config/staging
    tests:
      - name: deep copies a subtree
        input: { defaults: { timeout: 30 } }
        ops: [{ clone: { from: defaults, to: production } }]
        output: { defaults: { timeout: 30 }, production: { timeout: 30 } }
      - name: errors if target exists
        input: { a: 1, b: 2 }
        ops: [{ clone: { from: a, to: b } }]
        error: ALREADY_EXISTS

  nest:
    category: dtl
    description: Group sibling keys under a new parent mapping
    fields:
      path:
        type: string
        required: true
        description: Path to the parent mapping containing the siblings
      keys:
        type: sequence
        item_type: string
        required: true
        description: Keys to group (must be siblings in the parent)
      under:
        type: string
        required: true
        description: New key name for the wrapper mapping
    rules:
      - all keys must exist in the parent mapping
      - wrapper key must not already exist
      - listed keys are moved under the new wrapper
    errors:
      PATH_NOT_FOUND: parent path does not exist
      NOT_A_MAPPING: parent is not a mapping
      NOT_SIBLINGS: one or more keys not found in parent
      ALREADY_EXISTS: wrapper key already exists
    example:
      - nest:
          path: config
          keys: [host, port, name]
          under: database
    tests:
      - name: wraps sibling keys
        input: { config: { host: x, port: 5432, debug: true } }
        ops: [{ nest: { path: config, keys: [host, port], under: database } }]
        output: { config: { database: { host: x, port: 5432 }, debug: true } }

  split:
    category: dtl
    description: Distribute a mapping's keys into new child mappings
    fields:
      path:
        type: string
        required: true
        description: Path to the mapping to split
      into:
        type: mapping
        required: true
        description: "{new_child_key: [key_names]} — which keys go into which child"
    rules:
      - path must exist and be a mapping
      - all referenced keys must exist in the mapping
      - a key cannot appear in multiple children
      - unlisted keys stay on the original mapping
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_MAPPING: target is not a mapping
    example:
      - split:
          path: config
          into:
            database: [host, port, name]
            cache: [redis_url, ttl]
    tests:
      - name: distributes keys into groups
        input: { config: { host: x, port: 5432, level: debug } }
        ops: [{ split: { path: config, into: { db: [host, port], log: [level] } } }]
        output: { config: { db: { host: x, port: 5432 }, log: { level: debug } } }

  fold:
    category: dtl
    description: >
      Collapse a single-child mapping by promoting its only child.
      The wrapper key is removed and the child takes its place.
    fields:
      path:
        type: string
        required: true
        description: Path to the wrapper mapping (must have exactly one child key)
    rules:
      - path must exist and be a mapping
      - must have exactly one key
      - the single child replaces the wrapper
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_FOLDABLE: mapping has zero or more than one key
    example:
      - fold:
          path: config/wrapper
    tests:
      - name: collapses single-child mapping
        input: { config: { wrapper: { actual: { data: 1 } } } }
        ops: [{ fold: { path: config/wrapper } }]
        output: { config: { actual: { data: 1 } } }
      - name: errors if multiple keys
        input: { wrapper: { a: 1, b: 2 } }
        ops: [{ fold: { path: wrapper } }]
        error: NOT_FOLDABLE

  merge:
    category: dtl
    description: Combine sibling keys into one mapping
    fields:
      path:
        type: string
        required: true
        description: Path to the parent mapping
      keys:
        type: sequence
        item_type: string
        required: true
        description: Sibling keys to combine
      into:
        type: string
        required: true
        description: Key name for the merged result
    rules:
      - all keys must exist as siblings in the parent
      - values are combined (last wins on key conflict)
      - original keys are removed, merged key takes their place
    errors:
      PATH_NOT_FOUND: parent path does not exist
      NOT_A_MAPPING: parent is not a mapping
      NOT_SIBLINGS: one or more keys not found
    example:
      - merge:
          path: config
          keys: [db_primary, db_replica]
          into: database
    tests:
      - name: combines sibling mappings
        input: { config: { a: { x: 1 }, b: { y: 2 } } }
        ops: [{ merge: { path: config, keys: [a, b], into: merged } }]
        output: { config: { merged: { x: 1, y: 2 } } }

  sort:
    category: dtl
    description: Sort a sequence in place
    fields:
      path:
        type: string
        required: true
        description: Path to the sequence to sort
      by:
        type: string
        required: false
        description: >
          Key to sort by (for sequences of mappings).
          Omit for sequences of scalars.
      order:
        type: string
        required: false
        default: asc
        enum: [asc, desc]
        description: Sort direction
    rules:
      - target must exist and be a sequence
      - if 'by' is provided, items must be mappings with that key
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_SEQUENCE: target is not a sequence
    example:
      - sort:
          path: users
          by: name
          order: asc
    tests:
      - name: sorts sequence ascending
        input: { items: [cherry, apple, banana] }
        ops: [{ sort: { path: items } }]
        output: { items: [apple, banana, cherry] }

  unique:
    category: dtl
    description: Deduplicate a sequence, keeping first occurrence
    fields:
      path:
        type: string
        required: true
        description: Path to the sequence to deduplicate
      by:
        type: string
        required: false
        description: >
          Key to deduplicate by (for sequences of mappings).
          Omit for sequences of scalars.
    rules:
      - target must exist and be a sequence
      - keeps first occurrence, removes subsequent duplicates
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_SEQUENCE: target is not a sequence
    example:
      - unique:
          path: tags
    tests:
      - name: deduplicates sequence
        input: { tags: [a, b, a, c, b] }
        ops: [{ unique: { path: tags } }]
        output: { tags: [a, b, c] }

  pick:
    category: dtl
    description: Keep only specified keys in a mapping, remove the rest
    fields:
      path:
        type: string
        required: true
        description: Path to the mapping to filter
      keys:
        type: sequence
        item_type: string
        required: true
        description: Keys to keep
    rules:
      - target must exist and be a mapping
      - keys not in the list are removed
      - keys in the list that don't exist are ignored
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_MAPPING: target is not a mapping
    example:
      - pick:
          path: user
          keys: [name, email]
    tests:
      - name: keeps only listed keys
        input: { config: { host: x, port: 5432, secret: abc } }
        ops: [{ pick: { path: config, keys: [host, port] } }]
        output: { config: { host: x, port: 5432 } }

  omit:
    category: dtl
    description: Remove specified keys from a mapping, keep the rest
    fields:
      path:
        type: string
        required: true
        description: Path to the mapping to filter
      keys:
        type: sequence
        item_type: string
        required: true
        description: Keys to remove
    rules:
      - target must exist and be a mapping
      - keys in the list are removed
      - keys not found are ignored (idempotent)
    errors:
      PATH_NOT_FOUND: path does not exist
      NOT_A_MAPPING: target is not a mapping
    example:
      - omit:
          path: user
          keys: [password, internal_id]
    tests:
      - name: removes listed keys
        input: { config: { host: x, secret: abc } }
        ops: [{ omit: { path: config, keys: [secret, missing] } }]
        output: { config: { host: x } }

  # ═══════════════════════════════════════════════════════════════════════════
  # DCL — Data Control (assertions)
  # ═══════════════════════════════════════════════════════════════════════════

  assert:
    category: dcl
    description: >
      Validate a condition against the document. Read-only — never mutates.
      Fail-fast: if the assertion fails, execution stops.
    fields:
      path:
        type: string
        required: true
        description: Path to check
      equals:
        type: any
        required: false
        description: Expected value (deep equality check)
      exists:
        type: boolean
        required: false
        description: "true: path must exist. false: path must NOT exist."
      type:
        type: string
        required: false
        enum: [mapping, sequence, scalar]
        description: Expected type of the value at path
    rules:
      - at least one condition (equals, exists, type) must be provided
      - all provided conditions must pass
      - does not mutate the document
      - on failure, stops execution with ASSERTION_FAILED
    errors:
      ASSERTION_FAILED: condition not met (message includes details)
    example:
      - assert:
          path: config/database/host
          exists: true
          type: scalar
    tests:
      - name: passes when value equals expected
        input: { version: 2 }
        ops: [{ assert: { path: version, equals: 2 } }]
        output: { version: 2 }
      - name: fails when value differs
        input: { version: 1 }
        ops: [{ assert: { path: version, equals: 2 } }]
        error: ASSERTION_FAILED
      - name: passes exists check
        input: { config: {} }
        ops: [{ assert: { path: config, exists: true } }]
        output: { config: {} }

# ----------------------------------------------------------------------------
# Error Codes
# ----------------------------------------------------------------------------
errors:
  PATH_NOT_FOUND:
    description: The specified path does not exist in the document
  ALREADY_EXISTS:
    description: A key or path already exists where a new one is expected
  NOT_A_MAPPING:
    description: Expected a mapping (object) but found a different type
  NOT_A_SEQUENCE:
    description: Expected a sequence (array) but found a different type
  NOT_SIBLINGS:
    description: Referenced keys are not siblings in the same mapping
  NOT_FOLDABLE:
    description: Mapping cannot be folded (has zero or more than one key)
  INVALID_PATH:
    description: Path could not be traversed (intermediate is wrong type)
  ASSERTION_FAILED:
    description: An assert condition was not met
  UNKNOWN_OP:
    description: Operation name not recognized

# ----------------------------------------------------------------------------
# Execution
# ----------------------------------------------------------------------------
execution:
  order: sequential          # operations execute top to bottom
  on_error: stop             # stop at first failed operation
  immutable_input: true      # engine deep clones input, never mutates original
  idempotent_ops: [unset, omit]  # no error on missing target
  strict_ops:
    - define
    - drop
    - rename
    - set
    - populate
    - append
    - move
    - clone
    - nest
    - split
    - fold
    - merge
    - sort
    - unique
    - pick
  readonly_ops: [assert]     # never mutates the document

# ----------------------------------------------------------------------------
# Document Format
# ----------------------------------------------------------------------------
document:
  root_key: yops
  type: sequence of operations
  description: >
    A YOps document is a YAML file with a single root key "yops"
    containing a sequence of operations. Each operation is a mapping
    with exactly one key (the operation name) whose value contains
    the operation's fields.
  example:
    yops:
      - define:
          path: config/database
      - populate:
          path: config/database
          values:
            host: localhost
            port: 5432
      - set:
          path: config/database/pool_size
          value: 10
      - assert:
          path: config/database/host
          exists: true

# ============================================================================
# Decision Guide — which op to use
# ============================================================================
#
# Engineers often face "which op do I pick?" when several seem similar.
# This section resolves those ambiguities.

guide:

  # ── Create vs Set ──────────────────────────────────────────────────────────
  create_or_set:
    question: "I want to add something to the document"
    decision:
      - use: define
        when: "You need an empty mapping as a container (like mkdir)"
        note: "Errors if path exists — use for strict creation"
      - use: set
        when: "You know the exact value to place at a path"
        note: "Creates intermediates, overwrites existing — use for upsert"
      - use: populate
        when: "You have multiple key-value pairs to add to an existing mapping"
        note: "Target mapping must exist — combine with define for new mappings"
      - use: append
        when: "You are adding an item to the end of a sequence"
        note: "Target must be an existing sequence"

  # ── Remove ops ─────────────────────────────────────────────────────────────
  remove:
    question: "I want to remove something from the document"
    decision:
      - use: drop
        when: "The path MUST exist — removal is the intent, missing is a bug"
        note: "Strict — errors on PATH_NOT_FOUND"
      - use: unset
        when: "Remove if present, ignore if absent — cleanup / idempotent"
        note: "Idempotent — never errors on missing key"
      - use: omit
        when: "You want to remove specific keys from a mapping by name"
        note: "Idempotent — ignores missing keys"
      - use: pick
        when: "You want to KEEP specific keys and remove everything else"
        note: "Inverse of omit — unlisted keys are removed"

  # ── Restructure ops ────────────────────────────────────────────────────────
  restructure:
    question: "I want to reorganize the document shape"
    decision:
      - use: rename
        when: "Change a key name without moving its value"
        note: "Stays at the same level, preserves key order"
      - use: move
        when: "Relocate a subtree to a different path (changes level)"
        note: "Source is removed, destination is created"
      - use: clone
        when: "Copy a subtree — original stays, copy is independent"
        note: "Deep copy — mutations to clone do not affect source"
      - use: nest
        when: "Group sibling keys under a new parent (flatten to nested)"
        note: "Keys move DOWN one level: {a, b} becomes {wrapper: {a, b}}"
      - use: fold
        when: "Collapse a single-child wrapper (nested to flatten)"
        note: "Child moves UP one level: {wrapper: {child}} becomes {child}"
      - use: split
        when: "Distribute keys into multiple named groups"
        note: "Like nest but for multiple groups at once"
      - use: merge
        when: "Combine sibling mappings into one (reverse of split)"
        note: "Last wins on key conflicts"

  # ── Sequence ops ───────────────────────────────────────────────────────────
  sequence:
    question: "I want to work with arrays/sequences"
    decision:
      - use: append
        when: Add an item to the end
      - use: sort
        when: Reorder items (by value or by a key in mapping items)
      - use: unique
        when: Deduplicate (by value or by a key in mapping items)
      - use: drop
        when: Remove a specific item by index or key match
        example: "drop: { path: items/[0] } or drop: { path: users/[name=alice] }"

# ============================================================================
# Type Contracts — what each op expects and produces
# ============================================================================
#
# Every op has a type contract: what shape it expects at the target path,
# and what shape it leaves behind. This table is the quick reference.

contracts:

  # Format: op → expects (at target path) → produces (at target path)

  # DDL
  define:    { expects: "parent is mapping, final key absent", produces: "empty mapping {}" }
  drop:      { expects: "path exists (any type)", produces: "key removed" }
  rename:    { expects: "path exists, new name absent among siblings", produces: "same value, new key name" }

  # DML
  set:       { expects: "intermediates are mappings (auto-creates missing)", produces: "any value" }
  unset:     { expects: "parent is mapping (idempotent on missing key)", produces: "key removed" }
  populate:  { expects: "target is mapping", produces: "mapping with added/overwritten keys" }
  append:    { expects: "target is sequence", produces: "sequence with new item at end" }

  # DTL
  move:      { expects: "source exists, destination absent", produces: "value at new path, source removed" }
  clone:     { expects: "source exists, destination absent", produces: "independent deep copy at new path" }
  nest:      { expects: "target is mapping, listed keys exist", produces: "keys moved under new wrapper key" }
  split:     { expects: "target is mapping, listed keys exist", produces: "keys distributed into named groups" }
  fold:      { expects: "target is mapping with exactly 1 key", produces: "child replaces wrapper" }
  merge:     { expects: "target is mapping, listed keys are all mappings", produces: "combined mapping (last wins)" }
  sort:      { expects: "target is sequence", produces: "sorted sequence (stable)" }
  unique:    { expects: "target is sequence", produces: "deduplicated sequence (first wins)" }
  pick:      { expects: "target is mapping", produces: "mapping with only listed keys" }
  omit:      { expects: "target is mapping", produces: "mapping without listed keys" }

  # DCL
  assert:    { expects: "any (read-only)", produces: "document unchanged — fails on unmet condition" }

# ============================================================================
# Composition Recipes — common multi-op patterns
# ============================================================================
#
# Single ops are atoms. Real work is pipelines. These recipes show how
# ops compose to accomplish common tasks.

recipes:

  create_and_populate:
    description: Create a new section with initial values
    ops:
      - define:
          path: config/database
      - populate:
          path: config/database
          values: { host: localhost, port: 5432, name: mydb }
    before: {}
    after: { config: { database: { host: localhost, port: 5432, name: mydb } } }

  clone_and_customize:
    description: Create a variant from a template
    ops:
      - clone:
          from: environments/production
          to: environments/staging
      - set:
          path: environments/staging/host
          value: staging.db.internal
      - set:
          path: environments/staging/debug
          value: true
    before: { environments: { production: { host: prod.db.internal, port: 5432, debug: false } } }
    after:
      environments:
        production: { host: prod.db.internal, port: 5432, debug: false }
        staging: { host: staging.db.internal, port: 5432, debug: true }

  flatten_to_nested:
    description: Group flat keys into a structured hierarchy
    ops:
      - nest:
          path: config
          keys: [db_host, db_port, db_name]
          under: database
      - nest:
          path: config
          keys: [cache_url, cache_ttl]
          under: cache
    before: { config: { db_host: x, db_port: 5432, db_name: mydb, cache_url: "redis://...", cache_ttl: 300, debug: true } }
    after:
      config:
        database: { db_host: x, db_port: 5432, db_name: mydb }
        cache: { cache_url: "redis://...", cache_ttl: 300 }
        debug: true

  split_and_rename:
    description: Reorganize a flat mapping into named groups with clean keys
    ops:
      - split:
          path: settings
          into:
            database: [host, port]
            logging: [level, format]
      - rename:
          path: settings/logging/level
          to: severity
    before: { settings: { host: x, port: 5432, level: debug, format: json } }
    after:
      settings:
        database: { host: x, port: 5432 }
        logging: { severity: debug, format: json }

  collect_sort_dedup:
    description: Build a clean, sorted, unique list
    ops:
      - append:
          path: tags
          value: python
      - append:
          path: tags
          value: yaml
      - append:
          path: tags
          value: python
      - sort:
          path: tags
      - unique:
          path: tags
    before: { tags: [go, yaml] }
    after: { tags: [go, python, yaml] }

  guarded_mutation:
    description: Assert preconditions before mutating
    ops:
      - assert:
          path: version
          equals: 2
      - assert:
          path: config
          type: mapping
      - set:
          path: config/migrated
          value: true
      - set:
          path: version
          value: 3
    before: { version: 2, config: { host: x } }
    after: { version: 3, config: { host: x, migrated: true } }

  merge_and_fold:
    description: Combine siblings then collapse wrapper
    ops:
      - merge:
          path: root
          keys: [defaults, overrides]
          into: merged
      - fold:
          path: root
    before: { root: { defaults: { timeout: 30, retries: 3 }, overrides: { timeout: 60 } } }
    after: { merged: { timeout: 60, retries: 3 } }

  reshape_round_trip:
    description: Split into groups then merge back (demonstrates reversibility)
    ops:
      - split:
          path: config
          into: { db: [host, port], app: [debug, name] }
      - assert:
          path: config/db/host
          equals: x
      - merge:
          path: config
          keys: [db, app]
          into: flat
    before: { config: { host: x, port: 5432, debug: true, name: myapp } }
    after: { config: { flat: { host: x, port: 5432, debug: true, name: myapp } } }

# ============================================================================
# Error Reference — which ops throw which errors
# ============================================================================
#
# Quick reverse lookup: given an error code, which ops can produce it?

error_reference:

  PATH_NOT_FOUND:
    thrown_by: [drop, rename, populate, move, clone, nest, split, merge, sort, unique]
    meaning: >
      The path you specified doesn't exist. For strict ops, this is a hard error.
      Use resolvePath or assert to check before operating.

  ALREADY_EXISTS:
    thrown_by: [define, rename, move, clone, nest, split]
    meaning: >
      The target key/path already exists. These ops refuse to overwrite.
      Use set (which overwrites) or drop the existing key first.

  NOT_A_MAPPING:
    thrown_by: [populate, nest, split, merge, pick, omit]
    meaning: >
      You targeted a path that isn't a mapping (it's a scalar, sequence, or null).
      Check the type with assert before operating, or use set to reshape first.

  NOT_A_SEQUENCE:
    thrown_by: [append, sort, unique]
    meaning: >
      You targeted a path that isn't a sequence.
      Use set to create a sequence first, e.g. set path: items, value: []

  NOT_SIBLINGS:
    thrown_by: [nest, merge]
    meaning: >
      One or more keys you referenced don't exist as siblings in the parent mapping.
      Verify key names match exactly.

  NOT_FOLDABLE:
    thrown_by: [fold]
    meaning: >
      The mapping at the path has zero or more than one key. Fold requires
      exactly one child key. Use pick to reduce to one key first, or use
      a different restructuring op.

  INVALID_PATH:
    thrown_by: [set, populate]
    meaning: >
      The path can't be traversed because an intermediate value is a scalar
      or null (not a mapping/sequence). The engine won't silently overwrite
      intermediate values — reshape the document first.

  ASSERTION_FAILED:
    thrown_by: [assert]
    meaning: >
      One or more conditions (equals, exists, type) did not hold.
      All provided conditions are checked — the assertion fails on the
      first unmet condition.

  UNKNOWN_OP:
    thrown_by: [engine]
    meaning: >
      The operation name wasn't recognized by the registry. Check for typos
      or verify your engine version supports the op.
