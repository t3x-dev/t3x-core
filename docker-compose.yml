# T3X Full Stack
#
# Services:
# - t3x-webui:   Next.js frontend + API (uses @t3x/storage with PGLite)
# - t3x-runner:  Node.js eval engine (grey-box testing)
# - agent-demo:  Demo agent for testing (summarize + email)
#
# Usage:
#   docker-compose up                    # Start all services
#   docker-compose up -d                 # Start in background
#   docker-compose --profile n8n up      # Include n8n workflow engine
#   docker-compose down                  # Stop all services
#
# Ports:
#   3000 - WebUI (includes API routes)
#   8080 - Runner API
#   9000 - Demo Agent

version: '3.8'

services:
  # ============================================
  # T3X WebUI (Next.js + API Routes)
  # ============================================
  t3x-webui:
    build:
      context: .
      dockerfile: t3x-webui/Dockerfile
    container_name: t3x-webui
    ports:
      - "3000:3000"
    volumes:
      - t3x-data:/app/.t3x
    environment:
      - NEXT_PUBLIC_RUNNER_API_URL=http://localhost:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # T3X Runner (Node.js Eval Engine)
  # ============================================
  t3x-runner:
    build:
      context: .
      dockerfile: t3x-runner/Dockerfile
    container_name: t3x-runner
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # Agent Demo (Summarize + Email)
  # ============================================
  agent-demo:
    build:
      context: ./agent-demo
      dockerfile: Dockerfile
    container_name: agent-demo
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
    volumes:
      - agent-outbox:/app/outbox
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9000/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # n8n - Workflow Orchestration (optional)
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: t3x-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=UTC
    restart: unless-stopped
    profiles:
      - n8n
    networks:
      - t3x-network

networks:
  t3x-network:
    driver: bridge

volumes:
  t3x-data:
    driver: local
  agent-outbox:
    driver: local
  n8n-data:
    driver: local
