# T3X Full Stack
#
# Default services:
#   postgres   (5432)  PostgreSQL database
#   t3x-api    (8000)  Core API (Hono + Zod OpenAPI, auth-on by default)
#   t3x-webui  (3000)  WebUI (Next.js, auth-on by default)
#
# Optional services (via profiles):
#   t3x-runner   profile: runner      (8080)
#   agent-demo   profile: agent-demo  (9000)
#   n8n          profile: n8n         (5678)
#
# Usage:
#   cp .env.example .env              # Add your ANTHROPIC_API_KEY
#   docker compose up -d --build
#   docker compose --profile runner up -d --build
#   docker compose down

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: t3x-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-t3x}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-t3x_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-t3x}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # optional init scripts:
      # - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-t3x} -d ${POSTGRES_DB:-t3x}"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - t3x-network

  # ============================================
  # T3X API (Hono + Zod OpenAPI)
  # ============================================
  t3x-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: t3x-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL:-postgresql://t3x:t3x_dev_password@postgres:5432/t3x}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - ANTHROPIC_API_KEY
      - GOOGLE_AI_STUDIO_KEY
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # T3X WebUI (Next.js)
  # ============================================
  t3x-webui:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: t3x-webui
    ports:
      - "3000:3000"
    environment:
      - DATABASE_ADAPTER=postgres
      - DATABASE_URL=postgresql://t3x:t3x_dev_password@postgres:5432/t3x
      # Note: NEXT_PUBLIC_* env vars are set at BUILD time in Dockerfile
      # Runtime values here are ignored by client-side code
      - NEXT_PUBLIC_API_URL=http://t3x-api:8000
      # Server-side API URL for inter-container calls (NextAuth callback, SSR, etc.)
      - T3X_API_URL=http://t3x-api:8000
      - NEXT_PUBLIC_RUNNER_API_URL=http://localhost:8080
      # HOSTNAME must be 0.0.0.0 to override Docker's default container hostname
      - HOSTNAME=0.0.0.0
      # Auth is on by default for Docker/self-hosted use.
      # Keep API and WebUI auth settings aligned if you override AUTH_DISABLED.
      # Users register via built-in username/password at /login
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      # API keys for chat functionality (chat/stream is handled by WebUI's API route)
      - ANTHROPIC_API_KEY
    depends_on:
      postgres:
        condition: service_healthy
      t3x-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://0.0.0.0:3000').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # T3X Runner (Eval Engine)
  # ============================================
  t3x-runner:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    container_name: t3x-runner
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - T3X_API_URL=http://t3x-api:8000
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook
      - N8N_API_URL=http://n8n:5678/api/v1
      - N8N_API_KEY=${N8N_API_KEY:-}
      - LOG_LEVEL=info
      # Trace storage policy: always | on_failure | on_violation
      - TRACE_POLICY=${TRACE_POLICY:-always}
      # CORS: Allow WebUI access from common local origins
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      # LLM for assertion generation
      - ANTHROPIC_API_KEY
    depends_on:
      t3x-api:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - runner
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # Agent Demo (Summarize + Email)
  # ============================================
  agent-demo:
    build:
      context: ./apps/agent-demo
      dockerfile: Dockerfile
    container_name: agent-demo
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      - AGENT_DEMO_OUTBOX_DIR=/app/outbox
    volumes:
      - agent-outbox:/app/outbox
    restart: unless-stopped
    profiles:
      - agent-demo
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9000/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # n8n - Workflow Orchestration (optional)
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: t3x-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=UTC
    restart: unless-stopped
    profiles:
      - n8n
    networks:
      - t3x-network

networks:
  t3x-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  agent-outbox:
    driver: local
  n8n-data:
    driver: local
