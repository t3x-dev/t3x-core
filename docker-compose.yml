# T3X Full Stack
#
# Services:
# - t3x-core:    Python FastAPI backend (commits, conversations, lineage)
# - t3x-webui:   React frontend (canvas visualization)
# - t3x-runner:  Node.js eval engine (grey-box testing)
# - agent-demo:  Demo agent for testing (summarize + email)
#
# Usage:
#   docker-compose up                    # Start all services
#   docker-compose up -d                 # Start in background
#   docker-compose --profile n8n up      # Include n8n workflow engine
#   docker-compose down                  # Stop all services
#
# Ports:
#   3000 - WebUI
#   8000 - Core API
#   8080 - Runner API
#   9000 - Demo Agent

version: '3.8'

services:
  # ============================================
  # T3X Core API (Python FastAPI)
  # ============================================
  t3x-core:
    build:
      context: ./t3x-core
      dockerfile: Dockerfile
    container_name: t3x-core
    ports:
      - "8000:8000"
    volumes:
      - t3x-data:/app/.t3x
    environment:
      - CF_HOST=0.0.0.0
      - CF_PORT=8000
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # T3X WebUI (React + Vite)
  # ============================================
  t3x-webui:
    build:
      context: ./t3x-webui
      dockerfile: Dockerfile
    container_name: t3x-webui
    ports:
      - "3000:3000"
    environment:
      - VITE_CORE_API_URL=http://localhost:8000
      - VITE_RUNNER_API_URL=http://localhost:8080
    depends_on:
      t3x-core:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - t3x-network

  # ============================================
  # T3X Runner (Node.js Eval Engine)
  # ============================================
  t3x-runner:
    build:
      context: .
      dockerfile: t3x-runner/Dockerfile
    container_name: t3x-runner
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - T3X_CORE_URL=http://t3x-core:8000
      - LOG_LEVEL=info
    depends_on:
      t3x-core:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # Agent Demo (Summarize + Email)
  # ============================================
  agent-demo:
    build:
      context: ./agent-demo
      dockerfile: Dockerfile
    container_name: agent-demo
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
    volumes:
      - agent-outbox:/app/outbox
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9000/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # n8n - Workflow Orchestration (optional)
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: t3x-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=UTC
    restart: unless-stopped
    profiles:
      - n8n
    networks:
      - t3x-network

networks:
  t3x-network:
    driver: bridge

volumes:
  t3x-data:
    driver: local
  agent-outbox:
    driver: local
  n8n-data:
    driver: local
