# T3X Full Stack (root compose =唯一入口)
#
# 默认启动：
# - postgres   (5432)  Postgres (dev)
# - t3x-core   (8000)  Core API (Node server in t3x-cli)
# - t3x-webui  (3000)  WebUI (Vite build -> static serve)
#
# 可选组件通过 profiles 启动（避免 Phase A 一起拉起太多）：
# - t3x-runner   profile: runner
# - agent-demo   profile: agent-demo
# - n8n          profile: n8n
#
# Usage:
#   docker compose up -d --build
#   docker compose --profile runner up -d --build
#   docker compose --profile agent-demo up -d --build
#   docker compose --profile n8n up -d
#   docker compose down

services:
  # ============================================
  # PostgreSQL (optional storage backend for Core)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: t3x-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-t3x}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-t3x_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-t3x}
    volumes:
      - t3x-pgdata:/var/lib/postgresql/data
      # optional init scripts:
      # - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-t3x} -d ${POSTGRES_DB:-t3x}"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - t3x-network

  # ============================================
  # T3X Core API (Node server in t3x-cli)
  # ============================================
  t3x-core:
    build:
      context: .
      dockerfile: t3x-cli/Dockerfile
    container_name: t3x-core
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - t3x-data:/app/.t3x
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - T3X_ROOT=/app
      - DATABASE_URL=${DATABASE_URL:-postgresql://t3x:t3x_dev_password@postgres:5432/t3x}
      - T3X_RUNNER_URL=http://t3x-runner:8080
      - ANTHROPIC_API_KEY
      - GOOGLE_AI_STUDIO_KEY
      - GOOGLE_CLOUD_NLP_KEY
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # T3X WebUI (React + Vite)
  # ============================================
  t3x-webui:
    build:
      context: ./t3x-webui
      dockerfile: Dockerfile
      args:
        VITE_CORE_API_URL: ${VITE_CORE_API_URL:-http://localhost:8000}
        VITE_RUNNER_API_URL: ${VITE_RUNNER_API_URL:-http://localhost:8080}
    container_name: t3x-webui
    ports:
      - "3000:3000"
    depends_on:
      t3x-core:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - t3x-network

  # ============================================
  # T3X Runner (Node.js Eval Engine)
  # ============================================
  t3x-runner:
    build:
      context: .
      dockerfile: t3x-runner/Dockerfile
    container_name: t3x-runner
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - T3X_CORE_URL=http://t3x-core:8000
      - T3X_ENGINE_URL=http://t3x-core:8000
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook
      - LOG_LEVEL=info
    depends_on:
      t3x-core:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - runner
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # Agent Demo (Summarize + Email)
  # ============================================
  agent-demo:
    build:
      context: ./agent-demo
      dockerfile: Dockerfile
    container_name: agent-demo
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      - AGENT_DEMO_OUTBOX_DIR=/app/outbox
    volumes:
      - agent-outbox:/app/outbox
    restart: unless-stopped
    profiles:
      - agent-demo
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9000/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # n8n - Workflow Orchestration (optional)
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: t3x-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=UTC
    restart: unless-stopped
    profiles:
      - n8n
    networks:
      - t3x-network

networks:
  t3x-network:
    driver: bridge

volumes:
  t3x-data:
    driver: local
  t3x-pgdata:
    driver: local
  agent-outbox:
    driver: local
  n8n-data:
    driver: local
