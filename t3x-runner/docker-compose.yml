# T3X Runner Stack
#
# Full stack with:
# - t3x-runner: Grey-box agent evaluation
# - t3x-webui: Canvas visualization
# - n8n: Workflow orchestration
#
# Start:
#   docker-compose up
#
# Start with specific profile:
#   docker-compose --profile full up    # all services
#   docker-compose --profile minimal up  # runner only

version: '3.8'

services:
  # ============================================
  # T3X Runner - Grey-box evaluation
  # ============================================
  t3x-runner:
    build:
      context: ..
      dockerfile: t3x-runner/Dockerfile
    container_name: t3x-runner
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - T3X_CORE_URL=http://t3x-core:8000
      - LOG_LEVEL=info
    depends_on:
      - t3x-core
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # T3X Core API
  # ============================================
  t3x-core:
    build:
      context: ../t3x-core
      dockerfile: Dockerfile
    container_name: t3x-core
    ports:
      - "8000:8000"
    volumes:
      - t3x-data:/app/.t3x
    environment:
      - PORT=8000
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - t3x-network

  # ============================================
  # T3X WebUI - Canvas visualization
  # ============================================
  t3x-webui:
    build:
      context: ../t3x-webui
      dockerfile: Dockerfile
    container_name: t3x-webui
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://t3x-core:8000
      - VITE_RUNNER_URL=http://t3x-runner:8080
    depends_on:
      - t3x-core
      - t3x-runner
    restart: unless-stopped
    profiles:
      - full
    networks:
      - t3x-network

  # ============================================
  # n8n - Workflow Orchestration
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: t3x-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=UTC
      # Allow connections to local services
      - N8N_RUNNERS_DISABLED=false
    restart: unless-stopped
    profiles:
      - full
      - n8n
    networks:
      - t3x-network

  # ============================================
  # Redis (optional - for caching/queues)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: t3x-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    profiles:
      - full
    networks:
      - t3x-network

networks:
  t3x-network:
    driver: bridge

volumes:
  t3x-data:
    driver: local
  n8n-data:
    driver: local
  redis-data:
    driver: local
